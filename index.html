<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TimeMap PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:100vh; }

.search-box{
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:10px;
}

button{
margin-top:5px;
width:100%;
}
</style>

</head>

<body>

<div class="search-box">
<input type="text" id="search" placeholder="Qidiruv..." oninput="search(this.value)">
<button onclick="challenge()">🎯 Challenge</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([41.3,69.2],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const MAIN_URL = "https://opensheet.elk.sh/1Hedps20_fmQ9CB6QavBVedQNtdk7f6Zb8P8fkxeH70w/Sheet1";
const EXTRA_URL = "https://opensheet.elk.sh/1W0z-nLeC3VEmDn00N5T2UxFoEl0g5bwGze55flXcAlw/Sheet1";

let mainData = [];
let extraData = [];
let markers = [];

Promise.all([
fetch(MAIN_URL).then(r=>r.json()),
fetch(EXTRA_URL).then(r=>r.json())
]).then(([main, extra])=>{

mainData = main;
extraData = extra;

render(mainData);

});

function render(data){

markers.forEach(m=>map.removeLayer(m));
markers = [];

data.forEach(m=>{

const e = extraData.find(x=>x.ID === m.ID) || {};

const marker = L.marker([m.Lat, m.Lng]).addTo(map);

marker.bindPopup(`
<b>${m.Name}</b><br>

⭐ ${m.Rating} (${m.ReviewsCount})<br>
👀 ${m.Views}<br>

${m.Access==="yes"?"♿ Qulay<br>":""}
${e.Secret==="yes"?"😳 Secret joy<br>":""}

<p>${m.Description}</p>

<img src="${m.OldImage}" width="100%">
<img src="${m.NewImage}" width="100%">

`);

markers.push(marker);

});

}

function search(q){

const result = mainData.filter(p =>
(p.Name || "").toLowerCase().includes(q.toLowerCase()) ||
(p.Category || "").toLowerCase().includes(q.toLowerCase())
);

render(result);

}

function challenge(){

const random = mainData[Math.floor(Math.random()*mainData.length)];
alert("🎯 Bugungi challenge: " + random.Name);

}

// 🔥 YAQIN JOY
navigator.geolocation.getCurrentPosition(pos=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

const nearest = mainData.sort((a,b)=>
Math.abs(a.Lat-lat)+Math.abs(a.Lng-lng) -
(Math.abs(b.Lat-lat)+Math.abs(b.Lng-lng))
);

alert("📍 Sizga yaqin joy: " + nearest[0].Name);

});

</script>

</body>
</html>
</html>
