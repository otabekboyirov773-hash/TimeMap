<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeMap ULTRA FREE</title>

<!-- LEAFLET (TO‘G‘RI CDN) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body,html{margin:0;height:100%;background:black;color:white;overflow:hidden;font-family:sans-serif}
#map{width:100%;height:100%;transition:1s}

/* INTRO */
#splash{
position:fixed;width:100%;height:100%;
background:black;display:flex;align-items:center;justify-content:center;
z-index:9999;
}
#dot{
width:6px;height:6px;background:white;border-radius:50%;
box-shadow:0 0 30px white;transition:1.5s;
}
.explode #dot{transform:scale(500);opacity:0}

/* UI */
.panel{
position:absolute;top:10px;left:10px;
background:#111;padding:10px;border-radius:10px;z-index:1000
}
.wallet{
position:absolute;top:10px;right:10px;
background:#111;padding:10px;border-radius:10px
}
.slider{
position:absolute;right:10px;top:50%;
transform:translateY(-50%);
}
button{
margin-top:5px;width:100%;padding:8px;border:none;border-radius:6px;
background:#00f3ff;color:black;font-weight:bold;cursor:pointer
}
</style>
</head>

<body onclick="initAudio()">

<div id="splash"><div id="dot"></div></div>
<div id="map"></div>

<div class="panel">
<b>TimeMap FREE</b>
<button onclick="smartAI()">🧠 AI</button>
<button onclick="startHunt()">🏆 Hunt</button>
<button onclick="toggle3D()">3D</button>
<button onclick="invest()">💰 Invest</button>
</div>

<div class="wallet">🪙 <span id="coin">200</span></div>

<div class="slider">
<input type="range" min="1400" max="2100" value="2024" oninput="timeTravel(this.value)">
<div id="year">2024</div>
</div>

<script>

/* ================= SUPABASE ================= */
const db = supabase.createClient(
"https://dfxothberdebqvxopiic.supabase.co",
"sb_publishable_g12t45A3qd15z2DML2g1og_poyavfk0"
);

/* ================= MAP ================= */
var map = L.map('map').setView([41.31,69.27],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

setTimeout(()=>map.invalidateSize(),500);

/* ================= INTRO ================= */
setTimeout(()=>{
document.getElementById("splash").classList.add("explode");
speak("TimeMap ga xush kelibsiz");
setTimeout(()=>splash.style.display="none",1500);
},2000);

/* ================= AUDIO ================= */
let audioCtx;
function initAudio(){
if(!audioCtx) audioCtx=new AudioContext();
}

function beep(freq){
if(!audioCtx) return;
let o=audioCtx.createOscillator();
let g=audioCtx.createGain();
o.frequency.value=freq;
o.connect(g); g.connect(audioCtx.destination);
g.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.3);
o.start(); o.stop(audioCtx.currentTime+0.3);
}

/* ================= VOICE ================= */
function speak(t){
let m=new SpeechSynthesisUtterance(t);
m.lang="uz-UZ";
speechSynthesis.speak(m);
}

/* ================= WALLET ================= */
let coin=200;
function addCoin(c){
coin+=c;
document.getElementById("coin").innerText=coin;
}

/* ================= TIME ================= */
function timeTravel(y){
document.getElementById("year").innerText=y;

if(y<1800){
document.getElementById("map").style.filter="sepia(0.6)";
beep(40);
}
else if(y>2050){
document.getElementById("map").style.filter="hue-rotate(160deg)";
beep(200);
}
else{
document.getElementById("map").style.filter="none";
}

renderMarkers(y);
}

/* ================= 3D EFFECT ================= */
function toggle3D(){
let m=document.getElementById("map");
m.style.transform = m.style.transform.includes("45deg")
? "none"
: "perspective(1200px) rotateX(45deg) scale(1.1)";
}

/* ================= DATA ================= */
let places=[];
let markers=[];

async function load(){
let {data}=await db.from("places").select("*");
places=data||[];
timeTravel(2024);
}
load();

function renderMarkers(y){
markers.forEach(m=>map.removeLayer(m));
markers=[];

places.filter(p=>Math.abs(p.era-y)<=120).forEach(p=>{
let m=L.marker([p.lat,p.lng]).addTo(map);
m.on('click',()=>alert(p.name?.uz || p.name));
markers.push(m);
});
}

/* ================= AI ================= */
function smartAI(){

if(places.length===0){
alert("data yo‘q");
return;
}

let c=map.getCenter();

let best=places.map(p=>{
let d=Math.sqrt(
Math.pow(p.lat-c.lat,2)+
Math.pow(p.lng-c.lng,2)
);
return {...p,score:(p.rating||1)*10-d*100};
}).sort((a,b)=>b.score-a.score)[0];

map.setView([best.lat,best.lng],15);
speak("Eng yaxshi joy topildi");
}

/* ================= HUNT ================= */
let treasure={lat:39.654,lng:66.975};

function startHunt(){
speak("Xazina qidiruvi boshlandi");
}

map.on('move',()=>{
let c=map.getCenter();
let d=Math.sqrt(
Math.pow(c.lat-treasure.lat,2)+
Math.pow(c.lng-treasure.lng,2)
);

if(d<0.01){
addCoin(500);
speak("Xazina topildi");
alert("🎉 +500 coin");
}
});

/* ================= INVEST ================= */
function invest(){
window.open("https://t.me/TimeMap0");
}

</script>
</body>
</html>
