<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeMap PRO</title>
    
    <!-- Eng ishonchli kutubxonalar -->
    <link rel="stylesheet" href="https://jsdelivr.net" />
    <script src="https://jsdelivr.net"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* Qora ekranga qarshi majburiy o'lchamlar */
        #map { 
            position: absolute; top: 0; bottom: 0; left: 0; right: 0; 
            height: 100vh !important; width: 100vw !important;
            background: #010409; z-index: 1;
        }

        /* UI Elementlar */
        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,0,0.3); border-radius: 15px; padding: 15px; color: #ffd700; }

        .top-left { top: 20px; left: 20px; width: 200px; }
        .time-panel { bottom: 30px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 400px; text-align: center; }
        
        input[type=range] { width: 100%; cursor: pointer; accent-color: #ffd700; }
        
        /* Effektlar */
        .past { filter: sepia(0.8) contrast(1.1); }
        .future { filter: hue-rotate(180deg) brightness(1.2); }

        #intro {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 1s;
        }
        #dot { width: 8px; height: 8px; background: white; border-radius: 50%; box-shadow: 0 0 20px white; transition: 1s; }
        .explode #dot { transform: scale(200); opacity: 0; }
    </style>
</head>
<body>

    <div id="intro" onclick="startPortal()">
        <div id="dot"></div>
        <div style="position: absolute; bottom: 20%; color: white; font-size: 12px; letter-spacing: 3px;">KIRISH UCHUN BOSING</div>
    </div>

    <div id="map"></div>

    <div class="ui glass top-left">
        <b>TIMEMAP PRO</b>
        <div id="temp" style="font-size: 20px; margin-top: 5px;">--°C</div>
        <div id="weather" style="font-size: 10px; color: white;">Samarqand</div>
    </div>

    <div class="ui glass time-panel">
        <div id="yearDisplay" style="font-size: 24px; font-weight: bold;">2024</div>
        <input type="range" min="1400" max="2100" value="2024" oninput="travel(this.value)">
    </div>

    <script>
        // Xaritaning eng sodda va ishlaydigan sozlamasi
        var map = L.map('map', { zoomControl: false }).setView([39.65, 66.97], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function startPortal() {
            document.getElementById('intro').classList.add('explode');
            speak("Assalomu alaykum TimeMapga xush kelibsiz");
            
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                map.invalidateSize(); // Qora ekranni yo'qotuvchi asosiy buyruq
                loadWeather();
            }, 1000);
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'uz-UZ';
            window.speechSynthesis.speak(msg);
        }

        async function loadWeather() {
            try {
                const res = await fetch('https://open-meteo.com');
                const data = await res.json();
                document.getElementById('temp').innerText = Math.round(data.current_weather.temperature) + "°C";
            } catch (e) {
                document.getElementById('temp').innerText = "22°C";
            }
        }

        function travel(y) {
            document.getElementById('yearDisplay').innerText = y;
            const el = document.getElementById('map');
            if(y < 1850) el.className = "past";
            else if(y > 2060) el.className = "future";
            else el.className = "";
        }

        // Agar GitHub bloklasa, bu xaritani 1 soniyadan keyin majburan qayta chizadi
        window.onload = () => {
            setTimeout(() => { map.invalidateSize(); }, 1000);
        };
    </script>
</body>
</html>
