<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeMap Samarqand PRO</title>

<!-- ✅ LEAFLET (MUHIM) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- ✅ SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
:root {
  --gold:#ffd700;
  --neon:#00f3ff;
}

body,html {
  margin:0;
  height:100%;
  background:#000;
  font-family:sans-serif;
  overflow:hidden;
}

/* Xarita */
#map {
  width:100%;
  height:100%;
}

/* Panel */
.panel {
  position:absolute;
  top:20px;
  left:20px;
  background:rgba(0,0,0,0.7);
  padding:15px;
  border-radius:15px;
  color:white;
  z-index:1000;
}

/* Tugmalar */
.controls {
  position:absolute;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:1000;
}

.btn {
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:linear-gradient(135deg,#00f3ff,#7000ff);
  color:white;
}

/* Time slider */
.time-box {
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  z-index:1000;
  color:white;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <b style="color:var(--gold)">📍 Samarqand</b>
  <div id="weather">⏳ yuklanmoqda...</div>
  <div id="prayer">🕌 ...</div>
</div>

<div class="time-box">
  <div id="year">2024</div>
  <input type="range" min="1400" max="2100" value="2024" oninput="timeTravel(this.value)">
</div>

<div class="controls">
  <button class="btn" onclick="autoFill()">⚡ AI</button>
  <button class="btn" onclick="toggle3D()">3D</button>
  <button class="btn" onclick="location.reload()">🔄</button>
</div>

<script>

/* =========================
   🔥 SUPABASE ULASH
========================= */
const SUPABASE_URL = "https://dfxothberdebqvxopiic.supabase.co";
const SUPABASE_KEY = "SENING_ANON_KEYING"; // shu yerga qo‘y

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* =========================
   🗺️ XARITA
========================= */
const map = L.map('map').setView([39.654, 66.975], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom:19
}).addTo(map);

/* =========================
   📍 MARKER FUNKSIYA
========================= */
let markers = [];

function clearMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
}

function addMarker(loc) {
  let marker = L.marker([loc.lat, loc.lng])
    .addTo(map)
    .bindPopup(`<b>${loc.name}</b><br>${loc.description || ""}`);

  markers.push(marker);
}

/* =========================
   📡 DB DAN O‘QISH
========================= */
async function loadPlaces(year=2024) {
  clearMarkers();

  const { data, error } = await db.from('places').select('*');

  if(error) {
    console.log(error);
    return;
  }

  data.forEach(loc => {
    if(!loc.era || loc.era <= year){
      addMarker(loc);
    }
  });
}

loadPlaces();

/* =========================
   ⏳ TIME TRAVEL
========================= */
function timeTravel(y) {
  document.getElementById("year").innerText = y;

  if(y < 1800) document.getElementById("map").style.filter = "sepia(0.7)";
  else if(y > 2050) document.getElementById("map").style.filter = "hue-rotate(150deg)";
  else document.getElementById("map").style.filter = "none";

  loadPlaces(y);
}

/* =========================
   🤖 AI AUTO DATA
========================= */
async function autoFill() {
  const data = [
    { name:"Registon", lat:39.654, lng:66.975, era:1420, description:"Ulug‘bek davri" },
    { name:"Bibi Xonim", lat:39.662, lng:66.98, era:1404, description:"Amir Temur" },
    { name:"Future City", lat:39.66, lng:66.99, era:2100, description:"Kelajak shahri" }
  ];

  const { error } = await db.from('places').insert(data);

  if(error) alert("Xato: "+error.message);
  else {
    alert("AI joy qo‘shdi 🚀");
    loadPlaces();
  }
}

/* =========================
   🌐 WEATHER (fake demo)
========================= */
function loadWeather() {
  document.getElementById("weather").innerText = "☁️ 22°C";
  document.getElementById("prayer").innerText = "🕌 Bomdod 05:00 | Peshin 12:30";
}
loadWeather();

/* =========================
   🎮 3D EFFECT
========================= */
function toggle3D() {
  let m = document.getElementById("map");
  m.style.transform = m.style.transform ? "" : "perspective(1000px) rotateX(40deg)";
}

/* =========================
   🧠 QORA EKRAN FIX
========================= */
setTimeout(()=>{ map.invalidateSize(); },500);

</script>

</body>
</html>
