<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TimeMap NEXT LEVEL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;}
#map{height:100vh;}

/* TOP */
.top{
position:absolute;top:10px;left:10px;right:10px;
z-index:1000;
}
.top input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
}

/* BUTTONS */
.buttons{
position:absolute;
bottom:10px;
left:10px;
right:10px;
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
z-index:1000;
}
.buttons button{
padding:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
}

/* CARD */
.card{
position:absolute;
bottom:0;
left:0;
right:0;
background:#111;
padding:15px;
border-radius:20px 20px 0 0;
max-height:65%;
overflow:auto;
display:none;
z-index:1000;
}
.card img{width:100%;border-radius:12px;}

/* ADMIN */
.admin{
position:absolute;
top:60px;
left:10px;
right:10px;
background:#111;
padding:10px;
border-radius:10px;
display:none;
z-index:1000;
}
.admin input{
width:100%;
margin:5px 0;
padding:8px;
border:none;
border-radius:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="top">
<input placeholder="🔍 Qidiruv..." oninput="search(this.value)">
</div>

<div class="card" id="card"></div>

<div class="admin" id="adminBox">

<input id="pass" placeholder="Parol">
<button onclick="login()">Kirish</button>

<div id="adminPanel" style="display:none;">

<input id="name" placeholder="Joy nomi">
<input id="lat" placeholder="Lat">
<input id="lng" placeholder="Lng">
<input id="img" placeholder="Rasm link">

<button onclick="addPlace()">➕ Qo‘shish</button>

<hr>

<input id="challengeInput" placeholder="Challenge yoz">
<button onclick="saveChallenge()">🎯 Saqlash</button>

</div>
</div>

<div class="buttons">
<button onclick="nearby()">📍</button>
<button onclick="ai()">🧠</button>
<button onclick="top()">🔥</button>
<button onclick="toggleAdmin()">⚙️</button>
<button onclick="showChallenge()">🎯</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
let map=L.map('map').setView([41.3,69.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// DATA
const SHEET="https://opensheet.elk.sh/1Hedps20_fmQ9CB6QavBVedQNtdk7f6Zb8P8fkxeH70w/1";

let data=[],markers=[];
let localData=JSON.parse(localStorage.getItem("places")||"[]");

// LOAD
fetch(SHEET+"?t="+Date.now())
.then(r=>r.json())
.then(d=>{
data=d.map(x=>({
name:x.Name,
lat:+x.Lat,
lng:+x.Lng,
img:x.OldImage||x.NewImage,
category:x.Category
}));
merge();
})
.catch(()=>{
alert("Sheet ishlamadi, local ishlayapti");
merge();
});

function merge(){
data=[...data,...localData];
render(data);
}

// IMAGE FIX
function fixImg(url){
if(!url) return "https://picsum.photos/400/300";
return url+"?v="+Date.now();
}

// RENDER
function render(arr){
markers.forEach(m=>map.removeLayer(m));
markers=[];
arr.forEach(p=>{
let m=L.marker([p.lat,p.lng]).addTo(map);
m.on('click',()=>show(p));
markers.push(m);
});
}

// CARD
function show(p){
card.style.display="block";
card.innerHTML=`
<h3>${p.name}</h3>
<img src="${fixImg(p.img)}" onerror="this.src='https://picsum.photos/400/300'">
<button onclick="route(${p.lat},${p.lng})">🚗 Yo‘l</button>
`;
}

// ROUTE
function route(lat,lng){
navigator.geolocation.getCurrentPosition(pos=>{
window.open(`https://www.google.com/maps/dir/${pos.coords.latitude},${pos.coords.longitude}/${lat},${lng}`);
});
}

// SEARCH
function search(q){
q=q.toLowerCase();
render(data.filter(p=>p.name.toLowerCase().includes(q)));
}

// NEARBY
function nearby(){
navigator.geolocation.getCurrentPosition(pos=>{
let sorted=[...data].sort((a,b)=>
Math.hypot(a.lat-pos.coords.latitude,a.lng-pos.coords.longitude)-
Math.hypot(b.lat-pos.coords.latitude,b.lng-pos.coords.longitude)
);
render(sorted.slice(0,5));
});
}

// AI
function ai(){
nearby();
alert("🤖 AI tavsiya berdi");
}

// TOP
function top(){
render([...data].sort(()=>0.5-Math.random()).slice(0,5));
}

// ADMIN
function toggleAdmin(){
adminBox.style.display=
adminBox.style.display==="block"?"none":"block";
}

let adminPass="1234";

function login(){
if(pass.value===adminPass){
adminPanel.style.display="block";
}else alert("Xato");
}

// ADD PLACE
function addPlace(){
let p={
name:name.value,
lat:+lat.value,
lng:+lng.value,
img:img.value
};
localData.push(p);
localStorage.setItem("places",JSON.stringify(localData));
merge();
alert("Qo‘shildi");
}

// CHALLENGE
function saveChallenge(){
localStorage.setItem("challenge",challengeInput.value);
alert("Saqlandi");
}

function showChallenge(){
let c=localStorage.getItem("challenge")||"Hali yo‘q";
alert("🎯 "+c);
}

</script>

</body>
</html>
