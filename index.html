<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>TimeMap</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<style>
body{margin:0;background:#111;color:#fff;font-family:sans-serif;}
#map{height:100vh;}

#search{
position:fixed;top:10px;right:10px;
padding:10px;border-radius:12px;border:none;
background:rgba(255,255,255,0.1);
color:#fff;z-index:999;
}

.controls{
position:fixed;left:10px;top:10px;
display:flex;flex-direction:column;gap:6px;
z-index:999;
}

button{
padding:10px;border:none;border-radius:10px;
background:rgba(0,0,0,0.7);
color:white;cursor:pointer;
}

#notify{
position:fixed;bottom:20px;left:50%;
transform:translateX(-50%);
background:#000;padding:10px 15px;
border-radius:10px;display:none;
}
</style>
</head>

<body>

<input id="search" placeholder="🔍 masjid, food, shop...">

<div class="controls">
<button onclick="showTop()">🔥 Top</button>
<button onclick="showMosque()">🕌 Masjid</button>
<button onclick="showAll()">🌍 All</button>
<button onclick="share()">📤 Ulash</button>
<button onclick="startChallenge()">🎯 Challenge</button>
</div>

<div id="notify"></div>
<div id="map"></div>

<script>

const map=L.map('map').setView([41.3,69.2],6);

L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);

let places=[];
let markers=[];
let routeControl;
let userScore=0;

// 🔥 DATA
fetch("https://opensheet.elk.sh/1wjWc-7WzDx1-8co1LYXTIfwA7D6u6ej4AECgyiFDpec/Sheet1")
.then(r=>r.json())
.then(d=>{
places=d;
render(places);
});

// 🔔 NOTIFY
function notify(t){
const n=document.getElementById("notify");
n.innerText=t;
n.style.display="block";
setTimeout(()=>n.style.display="none",2500);
}

// 📍 RENDER
function render(list){
markers.forEach(m=>map.removeLayer(m));
markers=[];

list.forEach(p=>{
const marker=L.marker([p.Lat,p.Lng]).addTo(map)
.bindPopup(`
<b>${p.Name}</b><br>
${p.Type}<br>
${p.Access==="yes" ? "♿ Qulay" : ""}<br><br>

<button onclick="drawRoute(${p.Lat},${p.Lng})">🧭 Yo‘l</button><br><br>

<img src="${p.OldImage || 'https://via.placeholder.com/300'}" width="100%">
<img src="${p.NewImage || 'https://via.placeholder.com/300'}" width="100%">
`)
markers.push(marker);
});
}

// 🔍 SEARCH
document.getElementById("search").addEventListener("input",(e)=>{
const v=e.target.value.toLowerCase();
render(places.filter(p=>
p.Name.toLowerCase().includes(v) ||
p.Type.toLowerCase().includes(v)
));
});

// 🕌 FILTER
function showMosque(){
render(places.filter(p=>p.Type==="masjid"));
}

function showAll(){
render(places);
}

// 🔥 TOP
function showTop(){
navigator.geolocation.getCurrentPosition(pos=>{
const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

const sorted=[...places].sort((a,b)=>
Math.abs(a.Lat-lat)+Math.abs(a.Lng-lng) -
(Math.abs(b.Lat-lat)+Math.abs(b.Lng-lng))
);

render(sorted.slice(0,5));
});
}

// 🧠 SMART
function smartSuggest(lat,lng){
const sorted=[...places].sort((a,b)=>
Math.abs(a.Lat-lat)+Math.abs(a.Lng-lng) -
(Math.abs(b.Lat-lat)+Math.abs(b.Lng-lng))
);
const best=sorted[0];
notify("🔥 Sizga mos joy: "+best.Name);
map.setView([best.Lat,best.Lng],14);
}

// 🧭 ROUTE
function drawRoute(lat,lng){

navigator.geolocation.getCurrentPosition(pos=>{
const userLat=pos.coords.latitude;
const userLng=pos.coords.longitude;

if(routeControl){
map.removeControl(routeControl);
}

routeControl = L.Routing.control({
waypoints:[
L.latLng(userLat,userLng),
L.latLng(lat,lng)
]
}).addTo(map);

});
}

// 📤 SHARE
function share(){
if(navigator.share){
navigator.share({
title:"TimeMap",
text:"😳 Eng yaqin joylarni topadigan xarita!",
url:window.location.href
});
}else{
notify("Linkni ulashing 🙂");
}
}

// 🎯 CHALLENGE SYSTEM (LEVEL UP)
let currentTarget=null;

function startChallenge(){

currentTarget=places[Math.floor(Math.random()*places.length)];

notify("🎯 Toping: "+currentTarget.Name);

map.setView([currentTarget.Lat,currentTarget.Lng],13);

}

// 📍 USER LOCATION
navigator.geolocation.getCurrentPosition(pos=>{
const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

smartSuggest(lat,lng);

setTimeout(()=>showTop(),2000);
});

// 👀 LIVE
setInterval(()=>{
const random=places[Math.floor(Math.random()*places.length)];
notify("👀 Odamlar ko‘ryapti: "+random.Name);
},7000);

// 🎁 WOW
setTimeout(()=>{
notify("🎁 Sizga maxfiy joy ochildi!");
},3000);

</script>

</body>
</html>
