<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeMap PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:sans-serif; }

/* MAP */
#map { height:100vh; }

/* PANEL */
.panel {
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:12px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
width:260px;
animation:fadeIn 0.8s;
}

/* INPUT */
input {
width:100%;
padding:8px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:6px;
}

/* BUTTON */
button {
width:100%;
padding:8px;
border:none;
border-radius:8px;
margin-top:5px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover {
transform:scale(1.05);
}

.btn1 { background:#4CAF50; color:white; }
.btn2 { background:#2196F3; color:white; }
.btn3 { background:#ff5722; color:white; }
.btn4 { background:#9c27b0; color:white; }

/* POPUP */
.popup-img {
width:100%;
border-radius:10px;
margin-top:6px;
}

/* ANIMATION */
@keyframes fadeIn {
from {opacity:0; transform:translateY(-20px);}
to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="panel">
<input type="text" placeholder="🔍 Qidiruv..." oninput="search(this.value)">
<button class="btn1" onclick="challenge()">🎯 Challenge</button>
<button class="btn2" onclick="findNearest()">📍 Yaqin joy</button>
<button class="btn3" onclick="showTop()">🔥 Top joylar</button>
<button class="btn4" onclick="showAll()">🌍 Hammasi</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// 🌍 MAP INIT
const map = L.map('map').setView([41.3,69.2],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 🔗 SHEET URL (SENIKI)
const MAIN_URL = "https://opensheet.elk.sh/1Hedps20_fmQ9CB6QavBVedQNtdk7f6Zb8P8fkxeH70w/Sheet1";
const EXTRA_URL = "https://opensheet.elk.sh/1W0z-nLeC3VEmDn00N5T2UxFoEl0g5bwGze55flXcAlw/Sheet1";

let mainData = [];
let extraData = [];
let markers = [];

// 📡 LOAD DATA
Promise.all([
fetch(MAIN_URL).then(r=>r.json()),
fetch(EXTRA_URL).then(r=>r.json())
]).then(([main, extra])=>{

mainData = main.map(m=>({
...m,
Lat: parseFloat(m.Lat),
Lng: parseFloat(m.Lng),
Views: Number(m.Views)||0,
Rating: Number(m.Rating)||0
}));

extraData = extra;

render(mainData);

});

// 🎯 RENDER FUNCTION
function render(data){

markers.forEach(m=>map.removeLayer(m));
markers = [];

data.forEach(m=>{

if(!m.Lat || !m.Lng) return;

const e = extraData.find(x=>String(x.ID) === String(m.ID)) || {};

const marker = L.marker([m.Lat, m.Lng]).addTo(map);

marker.bindPopup(`
<b>${m.Name}</b><br>

⭐ ${m.Rating} (${m.ReviewsCount||0})<br>
👀 ${m.Views}<br>

${m.Access==="yes"?"♿ Qulay<br>":""}
${e.Secret==="yes"?"😳 Secret joy<br>":""}

<p>${m.Description || ""}</p>

<img src="${m.OldImage}" class="popup-img">

<a href="https://www.google.com/maps/dir/?api=1&destination=${m.Lat},${m.Lng}" target="_blank">
🚗 Borish yo‘li
</a>
`);

markers.push(marker);

});

}

// 🔍 SEARCH
function search(q){

q = q.toLowerCase();

const result = mainData.filter(p =>
(p.Name||"").toLowerCase().includes(q) ||
(p.City||"").toLowerCase().includes(q) ||
(p.Category||"").toLowerCase().includes(q)
);

render(result);

}

// 🎯 CHALLENGE
function challenge(){

const random = mainData[Math.floor(Math.random()*mainData.length)];

map.setView([random.Lat, random.Lng],14);

alert("🎯 Bugungi challenge:\n" + random.Name);

}

// 📍 NEAREST
function findNearest(){

navigator.geolocation.getCurrentPosition(pos=>{

const lat = pos.coords.latitude;
const lng = pos.coords.longitude;

function dist(a){
return Math.sqrt((a.Lat-lat)**2 + (a.Lng-lng)**2);
}

const nearest = mainData.sort((a,b)=>dist(a)-dist(b))[0];

map.setView([nearest.Lat, nearest.Lng],14);

alert("📍 Sizga yaqin joy:\n" + nearest.Name);

});

}

// 🔥 TOP
function showTop(){

const top = [...mainData].sort((a,b)=>b.Views - a.Views).slice(0,10);

render(top);

}

// 🌍 SHOW ALL
function showAll(){
render(mainData);
}

</script>

</body>
</html>
