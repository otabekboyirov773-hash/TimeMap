<!DOCTYPE html>
<html>
<head>
    <title>TimeMap Final</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Faqat eng ishonchli manbalar -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <style>
        body { margin: 0; padding: 0; background: black; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; }
        .ui { position: absolute; z-index: 1000; background: rgba(0,0,0,0.8); color: gold; padding: 15px; border-radius: 10px; top: 20px; right: 20px; text-align: center; border: 1px solid gold; }
        input { width: 200px; cursor: pointer; }
    </style>
</head>
<body onmousedown="initAudio()">

    <div id="map"></div>

    <div class="ui">
        <div id="yearDisplay" style="font-size: 24px; font-weight: bold;">2024</div>
        <input type="range" min="1400" max="2100" value="2024" oninput="moveTime(this.value)">
        <p style="font-size: 10px;">EKRANGA BOSING VA SURING</p>
    </div>

    <script>
        // XARITANI ISHGA TUSHIRISH
        var map = L.map('map', {zoomControl: false}).setView([39.65, 66.97], 13);
        
        // OSM xaritasi
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // OVOZ TIZIMI
        var audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playSound(freq, type) {
            if (!audioCtx) return;
            var osc = audioCtx.createOscillator();
            var g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.5);
        }

        function moveTime(v) {
            document.getElementById('yearDisplay').innerText = v;
            
            // O'tmish (Otlar)
            if(v < 1850) {
                playSound(40, 'square');
                document.getElementById('map').style.filter = "sepia(0.8)";
            } 
            // Kelajak (Mashinalar)
            else if(v > 2060) {
                playSound(150 + (v-2060), 'sawtooth');
                document.getElementById('map').style.filter = "hue-rotate(180deg) brightness(1.2)";
            } else {
                document.getElementById('map').style.filter = "none";
            }
        }

        // QORA EKRANNI DAVOLASH
        window.onload = function() {
            setTimeout(function() { 
                map.invalidateSize(); 
            }, 500);
        };
    </script>
</body>
</html>
