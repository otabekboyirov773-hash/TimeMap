<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeMap | Portal</title>
    
    <!-- Kutubxonalar - Eng barqaror havolalar -->
    <link rel="stylesheet" href="https://jsdelivr.net" />
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    
    <style>
        :root { --gold: #ffd700; --neon: #00f3ff; --glass: rgba(10, 15, 30, 0.9); }
        body { margin: 0; padding: 0; background: #010409; color: white; font-family: sans-serif; overflow: hidden; }
        
        /* Xarita muammosini hal qilish uchun qat'iy o'lchamlar */
        #map { 
            position: absolute; 
            top: 0; bottom: 0; left: 0; right: 0; 
            z-index: 1; 
            background: #000;
        }
        
        .ui-element { z-index: 1000; position: absolute; }
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; }

        .top-nav { top: 20px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; padding: 10px 15px; display: flex; }
        .search-bar { width: 100%; background: none; border: none; color: white; outline: none; }

        .time-box { right: 20px; top: 50%; transform: translateY(-50%); padding: 20px 10px; display: flex; flex-direction: column; align-items: center; }
        .v-range { appearance: slider-vertical; width: 10px; height: 250px; background: var(--gold); }

        .dock { bottom: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        .btn { width: 55px; height: 55px; border-radius: 50%; border: none; cursor: pointer; color: white; font-size: 20px; }
        .btn-ai { background: linear-gradient(45deg, #00f3ff, #bc00ff); box-shadow: 0 0 15px rgba(0,243,255,0.5); }

        #card { bottom: 90px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; padding: 20px; display: none; }
        
        /* Era filters */
        .past { filter: sepia(0.6) contrast(1.1); }
        .future { filter: hue-rotate(160deg) saturate(1.5); }
        .coin-box { top: 25px; right: 20px; padding: 8px 15px; border: 1px solid var(--gold); color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-element coin-box glass">🪙 <span id="tc">500</span> TC</div>
    <div class="ui-element top-nav glass"><input class="search-bar" placeholder="Qidiruv..." oninput="goSearch(this.value)"></div>

    <div class="ui-element time-box glass">
        <b id="year">2024</b>
        <input type="range" class="v-range" min="1400" max="2100" value="2024" oninput="changeYear(this.value)">
    </div>

    <div id="card" class="ui-element glass"></div>

    <div class="ui-element dock">
        <button class="btn glass" onclick="findMe()">📍</button>
        <button class="btn btn-ai" onclick="runAI()">🧠</button>
        <button class="btn glass" onclick="toggle3D()">🧭</button>
    </div>

    <script>
        // SUPABASE CONFIG
        const SURL = "https://supabase.co";
        const SKEY = "sb_publishable_g12t45A3qd15z2DML2g1og_poyavfk0"; 
        const supabaseClient = supabase.createClient(SURL, SKEY);

        // MAP INIT - Muhim: Leaflet uchun kadrni to'g'irlash
        var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([41.3, 69.2], 11);
        
        // GitHub uchun eng barqaror xarita qatlami
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var markers = L.layerGroup().addTo(map);

        // DATA LOADER
        async function loadPlaces(y) {
            const { data, error } = await supabaseClient.from('places').select('*');
            if (data) {
                markers.clearLayers();
                data.filter(p => Math.abs(p.era - y) <= 100).forEach(p => {
                    let m = L.marker([p.lat, p.lng]).addTo(markers);
                    m.on('click', () => {
                        let c = document.getElementById('card');
                        c.style.display = "block";
                        c.innerHTML = `<h3>${p.name} (${p.era})</h3><p>${p.description}</p><button onclick="this.parentElement.style.display='none'">Yopish</button>`;
                    });
                });
            }
        }

        function changeYear(v) {
            document.getElementById('year').innerText = v;
            let m = document.getElementById('map');
            if(v < 1850) m.className = "past"; else if(v > 2060) m.className = "future"; else m.className = "";
            loadPlaces(v);
        }

        // OTHER TOOLS
        function findMe() { map.locate({setView: true, maxZoom: 14}); }
        function toggle3D() { 
            let m = document.getElementById('map');
            m.style.transform = m.style.transform.includes("45deg") ? "none" : "perspective(1000px) rotateX(45deg)";
        }
        function runAI() { alert("AI: Tarixiy nuqtalarni kashf qilish uchun 1400-yilga o'ting!"); }

        // Start
        setTimeout(() => { map.invalidateSize(); changeYear(2024); }, 500);
    </script>
</body>
</html>
