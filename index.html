<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeMap AI PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:100vh; }

.panel{
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:12px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
width:270px;
}

input{width:100%;padding:8px;margin-bottom:5px;}
button{width:100%;padding:8px;margin-top:5px;border:none;border-radius:8px;cursor:pointer;}
.popup-img{width:100%;border-radius:10px;margin-top:5px;}
</style>
</head>

<body>

<div class="panel">
<input type="text" placeholder="🔍 Qidiruv..." oninput="search(this.value)">
<button onclick="challenge()">🎯 Challenge</button>
<button onclick="findNearest()">📍 Yaqin joy</button>
<button onclick="showTop()">🔥 Top</button>
<button onclick="aiRecommend()">🤖 AI</button>
<button onclick="login()">👤 Login</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([41.3,69.2],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const MAIN_URL = "https://opensheet.elk.sh/1Hedps20_fmQ9CB6QavBVedQNtdk7f6Zb8P8fkxeH70w/1";
const EXTRA_URL = "https://opensheet.elk.sh/1W0z-nLeC3VEmDn00N5T2UxFoEl0g5bwGze55flXcAlw/1";

let mainData=[], extraData=[], markers=[];

Promise.all([
fetch(MAIN_URL).then(r=>r.json()),
fetch(EXTRA_URL).then(r=>r.json())
]).then(([main,extra])=>{

mainData = main.map(m=>({
...m,
Lat:parseFloat(m.Lat),
Lng:parseFloat(m.Lng),
Views:Number(m.Views)||0,
Rating:Number(m.Rating)||0
}));

extraData=extra;
render(mainData);

});

// RENDER
function render(data){

markers.forEach(m=>map.removeLayer(m));
markers=[];

data.forEach(m=>{

if(!m.Lat || !m.Lng) return;

const marker=L.marker([m.Lat,m.Lng]).addTo(map);

marker.bindPopup(`
<b>${m.Name}</b><br>
⭐ ${m.Rating} | 👀 ${m.Views}<br>

<img src="${m.OldImage || 'https://via.placeholder.com/300'}" class="popup-img">

<br>
<button onclick="openRoute(${m.Lat},${m.Lng})">🚗 Yo‘l</button>
<button onclick="like('${m.ID}')">❤️ Like</button>
`);

markers.push(marker);

});

}

// SEARCH
function search(q){
q=q.toLowerCase().trim();
if(!q){render(mainData);return;}

render(mainData.filter(p=>
(p.Name||"").toLowerCase().includes(q) ||
(p.City||"").toLowerCase().includes(q)
));
}

// ROUTE
function openRoute(lat,lng){
window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`);
}

// LIKE
function like(id){
let l=JSON.parse(localStorage.getItem("likes")||"{}");
l[id]=(l[id]||0)+1;
localStorage.setItem("likes",JSON.stringify(l));
alert("❤️ Like qo‘shildi!");
}

// LOGIN
function login(){
let n=prompt("Ism:");
if(n){localStorage.setItem("user",n);}
}

// CHALLENGE
function challenge(){
const r=mainData[Math.floor(Math.random()*mainData.length)];
map.setView([r.Lat,r.Lng],14);
alert("🎯 Borib ko‘r: "+r.Name);
}

// NEAREST
function findNearest(){
navigator.geolocation.getCurrentPosition(pos=>{
const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

const n=mainData.sort((a,b)=>
Math.hypot(a.Lat-lat,a.Lng-lng)-Math.hypot(b.Lat-lat,b.Lng-lng)
)[0];

map.setView([n.Lat,n.Lng],14);
alert("📍 Yaqin: "+n.Name);
});
}

// TOP
function showTop(){
render([...mainData].sort((a,b)=>b.Views-a.Views).slice(0,10));
}

// AI
function aiRecommend(){
const r=mainData[Math.floor(Math.random()*mainData.length)];
map.setView([r.Lat,r.Lng],14);
alert("🤖 Tavsiya: "+r.Name);
}

</script>
</body>
</html>
