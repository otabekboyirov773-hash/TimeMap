<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TimeMap</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:sans-serif;background:#111;color:white;}
#map{height:100vh;}

/* TOP BAR */
.top{
position:absolute;top:10px;left:10px;right:10px;
display:flex;gap:5px;z-index:1000;
}
.top input{
flex:1;padding:10px;border-radius:10px;border:none;
}

/* BUTTONS */
.menu{
position:absolute;bottom:10px;left:10px;right:10px;
display:flex;gap:5px;z-index:1000;
}
.menu button{
flex:1;padding:10px;border:none;border-radius:10px;
background:#22c55e;color:white;
}

/* ADMIN */
.admin{
position:absolute;top:60px;left:10px;right:10px;
background:#222;padding:10px;border-radius:10px;
display:none;z-index:1000;
}
.admin input{
width:100%;margin:3px 0;padding:8px;border-radius:8px;border:none;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="top">
<input placeholder="Qidiruv..." oninput="search(this.value)">
</div>

<div class="menu">
<button onclick="ai()">AI</button>
<button onclick="nearby()">Nearby</button>
<button onclick="toggleAdmin()">Admin</button>
</div>

<!-- ADMIN PANEL -->
<div class="admin" id="adminBox">

<h3>ADMIN PANEL</h3>

<input id="name" placeholder="Joy nomi">
<input id="lat" placeholder="Lat">
<input id="lng" placeholder="Lng">
<input id="img" placeholder="Rasm link">

<button onclick="addPlace()">➕ Qo‘shish</button>

<hr>

<input id="challengeText" placeholder="Challenge yoz">
<button onclick="saveChallenge()">🎯 Saqlash</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
const map=L.map('map').setView([41.3,69.2],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let data = JSON.parse(localStorage.getItem("places")||"[]");
let markers=[];

// RENDER
function render(arr){

markers.forEach(m=>map.removeLayer(m));
markers=[];

arr.forEach(p=>{

let m=L.marker([p.lat,p.lng]).addTo(map);

m.bindPopup(`
<b>${p.name}</b>
<img src="${p.img}" width="100%" onerror="this.src='https://via.placeholder.com/300'">
`);

markers.push(m);

});

}

render(data);

// ADD PLACE (ADMIN)
function addPlace(){

let p={
name:name.value,
lat:+lat.value,
lng:+lng.value,
img:img.value
};

data.push(p);

localStorage.setItem("places",JSON.stringify(data));

render(data);

alert("Qo‘shildi ✅");

}

// SEARCH
function search(q){
q=q.toLowerCase();
render(data.filter(p=>p.name.toLowerCase().includes(q)));
}

// AI (oddiy ishlaydigan)
function ai(){

if(data.length===0){
alert("Joy yo‘q");
return;
}

let r=data[Math.floor(Math.random()*data.length)];

map.setView([r.lat,r.lng],14);

alert("AI tavsiya: "+r.name);

}

// NEARBY
function nearby(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude,lng=pos.coords.longitude;

let sorted=data.sort((a,b)=>
Math.hypot(a.lat-lat,a.lng-lng)-
Math.hypot(b.lat-lat,b.lng-lng)
);

render(sorted.slice(0,5));

});

}

// ADMIN TOGGLE
function toggleAdmin(){

let box=document.getElementById("adminBox");

box.style.display = box.style.display==="none" ? "block" : "none";

}

// CHALLENGE SAVE
function saveChallenge(){

let text=challengeText.value;

localStorage.setItem("challenge",text);

alert("Challenge saqlandi 🎯");

}

</script>

</body>
</html>
