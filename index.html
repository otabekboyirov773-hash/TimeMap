<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const supabase = window.supabase.createClient(
 "https://omcrlaoicvtkojeeyvwb.supabase.co",
 "sb_publishable_g12t45A3qd15z2DML2g1og_poyavfk0"
);

// MAP
const map = L.map('map').setView([41.3,69.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// USER
let userId = localStorage.uid || crypto.randomUUID();
localStorage.uid = userId;

// LOCATION
navigator.geolocation.watchPosition(pos=>{
 const lat = pos.coords.latitude;
 const lng = pos.coords.longitude;

 loadCoins(lat,lng);
});

// COINS
async function loadCoins(lat,lng){
 const {data} = await supabase.rpc("get_nearby_coins",{p_lat:lat,p_lng:lng});

 if(!data) return;

 data.forEach(c=>{
  const m = L.circleMarker([c.lat,c.lng]).addTo(map);

  m.on("click",async ()=>{
   await supabase.rpc("add_coins",{p_user:userId,amount:c.amount});
   m.remove();
  });
 });
}

</script>
