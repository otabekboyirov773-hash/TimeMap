<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>TimeMap PRO MAX | Ultimate Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Xarita va Kutubxonalar -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <script src="https://jsdelivr.net"></script>

    <style>
        :root { --gold: #ffd700; --neon: #00f3ff; --glass: rgba(10, 15, 20, 0.9); }
        body, html { margin:0; height:100%; background:black; color:white; font-family: 'Segoe UI', sans-serif; overflow:hidden; }
        
        /* 🌌 INTRO BIG BANG */
        #intro { position:fixed; top:0; left:0; width:100%; height:100%; background:black; display:flex; align-items:center; justify-content:center; z-index:9999; }
        #dot { width:4px; height:4px; background:white; border-radius:50%; box-shadow:0 0 20px 5px white; transition:1.5s cubic-bezier(0.9, 0, 0.1, 1); }
        .explode #dot { transform:scale(1000); opacity:0; }
        .hide-intro { opacity: 0; pointer-events: none; transition: 1s; }

        /* 🗺 XARITA */
        #map { position:absolute; top:0; bottom:0; width:100%; z-index: 1; transition: 0.8s filter; }

        /* 📱 UI PANELS */
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; position: absolute; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .top-left { top: 20px; left: 20px; width: 250px; border-left: 4px solid var(--neon); }
        .top-right { top: 20px; right: 20px; text-align: right; min-width: 160px; border-right: 4px solid var(--gold); }
        .wallet-ui { top: 130px; right: 20px; font-weight: bold; border: 1px solid var(--gold); color: var(--gold); }
        
        .time-machine { bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 500px; text-align: center; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--neon); margin-top: 10px; }

        button { width: 100%; margin-top: 10px; padding: 12px; border: none; border-radius: 10px; background: var(--neon); color: black; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        button:hover { filter: brightness(1.2); transform: scale(1.02); }

        /* 🎨 ERA FILTERS */
        .era-past { filter: sepia(0.7) contrast(1.1) brightness(0.8) !important; }
        .era-future { filter: hue-rotate(160deg) saturate(1.5) brightness(1.1) !important; }

        .ai-status { font-size: 10px; color: var(--neon); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <!-- Koinot Portlashi Intro -->
    <div id="intro"><div id="dot"></div></div>

    <div id="map"></div>

    <!-- Chap Panel -->
    <div class="glass top-left">
        <span class="ai-status">AI System Active</span>
        <b style="font-size: 20px;">TIMEMAP <span style="color:var(--gold)">PRO</span></b>
        <button onclick="smartAI()">🧠 AI TOP 5</button>
        <button onclick="addPlace()">📍 JOY QO'SHISH</button>
        <button onclick="window.open('https://t.me')">💰 INVESTOR BO'LISH</button>
    </div>

    <!-- O'ng Panel (Ob-havo) -->
    <div class="glass top-right">
        <div id="city-name" style="font-size: 12px; opacity: 0.8;">Samarqand</div>
        <div id="temp" style="font-size: 28px; font-weight: bold; color: var(--neon);">--°C</div>
        <div id="weather-desc" style="font-size: 11px;">Yuklanmoqda...</div>
    </div>

    <!-- Hamyon -->
    <div class="glass wallet-ui">
        🪙 <span id="coins">300</span> TC
    </div>

    <!-- Vaqt Mashinasi -->
    <div class="glass time-machine">
        <div style="display: flex; justify-content: space-between; font-size: 12px; opacity: 0.6;">
            <span>1400 (O'TMISH)</span>
            <span id="year-display" style="font-size: 24px; font-weight: bold; color: var(--gold); opacity: 1;">2024</span>
            <span>2100 (KELAJAK)</span>
        </div>
        <input type="range" min="1400" max="2100" value="2024" oninput="timeTravel(this.value)">
    </div>

<script>
/* ================= CONFIG ================= */
const supabaseClient = supabase.createClient(
    "https://supabase.co",
    "sb_publishable_g12t45A3qd15z2DML2g1og_poyavfk0"
);

// Xarita (Leaflet - Qotmaydigan va 100% ochiladigan)
const map = L.map('map', { zoomControl: false }).setView([39.654, 66.975], 13);
L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png').addTo(map);

let coins = 300;

/* ================= INTRO & START ================= */
window.onload = () => {
    setTimeout(() => {
        document.getElementById("intro").classList.add("explode");
        speak("Assalomu alaykum! TimeMap saytiga xush kelibsiz. Men sizning sun'iy intellekt yo'lboshchingizman.");
        
        setTimeout(() => {
            document.getElementById("intro").classList.add("hide-intro");
            map.invalidateSize();
            getWeather(39.654, 66.975);
            loadPlacesFromDB();
        }, 1200);
    }, 2000);
};

/* ================= AI OVOZ FUNKSIYASI ================= */
function speak(text) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = "uz-UZ";
    msg.rate = 0.95;
    window.speechSynthesis.speak(msg);
}

/* ================= REAL-TIME OB-HAVO API ================= */
async function getWeather(lat, lng) {
    try {
        const response = await fetch(`https://open-meteo.com{lat}&longitude=${lng}&current_weather=true`);
        const data = await response.json();
        const temp = Math.round(data.current_weather.temperature);
        document.getElementById("temp").innerText = temp + "°C";
        document.getElementById("weather-desc").innerText = "Real-vaqt harorati";
    } catch (e) {
        document.getElementById("temp").innerText = "??°C";
    }
}

/* ================= VAQT SAYOHATI ================= */
function timeTravel(y) {
    document.getElementById("year-display").innerText = y;
    const mapEl = document.getElementById('map');
    
    if(y < 1850) {
        mapEl.className = "era-past";
        if(y % 50 === 0) speak(y + " yil. Siz qadimiy buyuk ipak yo'li davridasiz.");
    } else if(y > 2060) {
        mapEl.className = "era-future";
        if(y % 10 === 0) speak(y + " yil. Kelajak texnologiyalari va uchar binolar davri.");
    } else {
        mapEl.className = "";
    }
}

/* ================= BAZADAN JOYLARNI OLISH ================= */
async function loadPlacesFromDB() {
    const { data, error } = await supabaseClient.from("places").select("*");
    if(data) {
        data.forEach(p => {
            const marker = L.marker([p.lat, p.lng]).addTo(map);
            marker.on('click', () => {
                speak("Siz " + p.name + " haqida so'radingiz. Bu yer " + (p.era || 2024) + " yildagi eng muhim nuqtalardan biri.");
                marker.bindPopup(`<b>${p.name}</b><br>Davr: ${p.era || 2024}-yil`).openPopup();
            });
        });
    }
}

/* ================= SMART AI TOP 5 ================= */
function smartAI() {
    speak("Hozir tahlil qilaman. Sizga eng yaqin beshta strategik kashfiyot nuqtalari topildi.");
    alert("🚀 AI TOP 5:\n1. Registon (1420)\n2. Gur-Amir (1403)\n3. Shoxi-Zinda (1370)\n4. Ulug'bek Rasadxonasi (1424)\n5. Kelajak Hub (2100)");
}

/* ================= JOY QO'SHISH ================= */
async function addPlace() {
    const name = prompt("Yangi joy nomini kiriting:");
    if(!name) return;
    
    const center = map.getCenter();
    const { error } = await supabaseClient.from("places").insert([
        { name: name, lat: center.lat, lng: center.lng, era: 2024 }
    ]);
    
    if(!error) {
        speak("Muvaffaqiyatli! Yangi joy qo'shildi va hamyoningizga ellikta koin tushdi.");
        coins += 50;
        document.getElementById("coins").innerText = coins;
        L.circleMarker([center.lat, center.lng], {color: 'cyan', radius: 10}).addTo(map).bindPopup(name).openPopup();
    }
}

// Xarita surilganda ob-havoni avtomat yangilash
map.on('moveend', () => {
    const c = map.getCenter();
    getWeather(c.lat, c.lng);
});

</script>
</body>
</html>
