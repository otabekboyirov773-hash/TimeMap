<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>TimeMap PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body,html{margin:0;height:100%;background:#000;color:white;font-family:sans-serif;}
#map{height:100%;}
.panel{position:absolute;top:10px;left:10px;background:#111;padding:10px;border-radius:10px;z-index:1000;width:220px;}
button{margin-top:5px;width:100%;padding:7px;border:none;border-radius:7px;background:#00f3ff;}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<b>TimeMap</b>

<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">

<button onclick="signUp()">SignUp</button>
<button onclick="signIn()">Login</button>
<button onclick="addPlace()">+ Joy</button>
<button onclick="myPlaces()">👤 Mening joylarim</button>
<button onclick="topNearby()">📍 TOP 5</button>
</div>

<script>

/* CONFIG */
const url="https://dfxothberdebqvxopiic.supabase.co";
const key="sb_publishable_g12t45A3qd15z2DML2g1og_poyavfk0";
const db=supabase.createClient(url,key);

let user=null;

/* MAP */
const map=L.map('map').setView([41.31,69.27],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers=[];

/* AUTH */
async function signUp(){
 const {error}=await db.auth.signUp({
   email:val("email"),password:val("pass")
 });
 alert(error?error.message:"OK");
}

async function signIn(){
 const {data,error}=await db.auth.signInWithPassword({
   email:val("email"),password:val("pass")
 });

 if(!error){
   user=data.user;
   alert("Login OK");
   loadPlaces();
 }
}

/* ADD PLACE */
async function addPlace(){
 if(!user){alert("Login qil");return;}

 const name=prompt("Nom:");
 const lat=map.getCenter().lat;
 const lng=map.getCenter().lng;

 await db.from('places').insert([
   {name,lat,lng,owner:user.id}
 ]);

 loadPlaces();
}

/* LOAD */
async function loadPlaces(){
 clear();

 const {data}=await db.from('places').select('*');

 data.forEach(p=>{
   let m=L.marker([p.lat,p.lng]).addTo(map)
   .bindPopup(`
     <b>${p.name}</b><br>
     ⭐ ${p.rating.toFixed(1)}
     <br>
     <button onclick="like('${p.id}')">❤️ Like</button>
     <button onclick="rate('${p.id}')">⭐ Rate</button>
   `);

   markers.push(m);
 });
}

/* LIKE */
async function like(id){
 await db.from('likes').insert([{user_id:user.id,place_id:id}]);
 alert("Like qo‘shildi");
}

/* RATE */
async function rate(id){
 let v=prompt("1-5 baho:");
 v=parseInt(v);

 await db.from('ratings').insert([
   {user_id:user.id,place_id:id,value:v}
 ]);

 updateRating(id);
}

/* UPDATE RATING */
async function updateRating(id){
 const {data}=await db.from('ratings').select('*').eq('place_id',id);

 let avg=data.reduce((a,b)=>a+b.value,0)/data.length;

 await db.from('places').update({rating:avg}).eq('id',id);

 loadPlaces();
}

/* MY PLACES */
async function myPlaces(){
 clear();
 const {data}=await db.from('places').select('*').eq('owner',user.id);

 data.forEach(p=>{
   let m=L.marker([p.lat,p.lng]).addTo(map).bindPopup("👤 "+p.name);
   markers.push(m);
 });
}

/* TOP NEARBY */
async function topNearby(){
 clear();
 const center=map.getCenter();

 const {data}=await db.from('places').select('*');

 let sorted=data.sort((a,b)=>b.rating-a.rating).slice(0,5);

 sorted.forEach(p=>{
   let m=L.marker([p.lat,p.lng]).addTo(map)
   .bindPopup("🔥 "+p.name+" ⭐"+p.rating);
   markers.push(m);
 });
}

/* HELP */
function val(id){return document.getElementById(id).value;}
function clear(){markers.forEach(m=>map.removeLayer(m));markers=[];}

setTimeout(()=>map.invalidateSize(),500);

</script>
</body>
</html>
