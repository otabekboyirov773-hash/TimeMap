<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeMap PRO | Portal</title>

    <!-- Leaflet & Supabase - HTTPS orqali -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --gold: #ffd700; --neon: #00f3ff; --glass: rgba(10, 15, 30, 0.9); }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Xarita ekranni to'liq egallashi uchun */
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; background: #010409; }

        .ui { position: absolute; z-index: 1000; }
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }

        /* Top Search */
        .top-ui { top: 20px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 450px; padding: 12px 20px; display: flex; align-items: center; }
        .search-bar { width: 100%; background: none; border: none; color: white; outline: none; font-size: 16px; }

        /* Vertical Time Slider */
        .time-machine { right: 20px; top: 50%; transform: translateY(-50%); padding: 25px 15px; display: flex; flex-direction: column; align-items: center; }
        .v-range { appearance: slider-vertical; width: 12px; height: 300px; background: var(--gold); border-radius: 10px; cursor: pointer; }

        /* Bottom Controls */
        .dock { bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        .btn { width: 60px; height: 60px; border-radius: 50%; border: none; cursor: pointer; font-size: 24px; color: white; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-ai { background: linear-gradient(135deg, #00f3ff, #bc00ff); box-shadow: 0 0 20px rgba(0,243,255,0.5); }

        /* Info Card */
        .portal-card { bottom: 110px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; padding: 20px; display: none; animation: pop 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .portal-card img { width: 100%; border-radius: 15px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.2); }

        /* Era Filters */
        .past { filter: sepia(0.6) contrast(1.1) brightness(0.9) !important; }
        .future { filter: hue-rotate(170deg) saturate(1.6) brightness(1.2) !important; }
        
        .coin-box { top: 25px; right: 25px; padding: 10px 20px; font-weight: bold; color: var(--gold); border: 2px solid var(--gold); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui coin-box glass">🪙 <span id="balance">500</span> TC</div>
    
    <div class="ui top-ui glass">
        <input class="search-bar" placeholder="🔍 Vaqt va makonni kashf eting..." oninput="search(this.value)">
    </div>

    <div class="ui time-machine glass">
        <span id="yearLabel" style="font-weight: bold; color: var(--gold); margin-bottom: 20px; font-size: 24px;">2024</span>
        <input type="range" class="v-range" min="1400" max="2100" value="2024" oninput="travelToYear(this.value)">
    </div>

    <div id="infoCard" class="ui portal-card glass">
        <div id="cardContent"></div>
        <button onclick="closeCard()" style="width:100%; margin-top:15px; padding:12px; border:none; border-radius:10px; background:var(--gold); color:black; font-weight:bold; cursor:pointer;">YOPISH</button>
    </div>

    <div class="ui dock">
        <button class="btn glass" onclick="nearby()">📍</button>
        <button class="btn btn-ai" onclick="ai()">🧠</button>
        <button class="btn glass" onclick="toggle3D()">🧭</button>
        <button class="btn glass" onclick="location.reload()">🔄</button>
    </div>

    <script>
        // 1. SUPABASE CONNECTION (Xavfsiz ulanish)
        const SB_URL = "https://dfxothberdebqvxopiic.supabase.co";
        const SB_KEY = "sb_publishable_g12t45A3qd15z2DML2g1og_poyavfk0"; 
        const db = supabase.createClient(SB_URL, SB_KEY);

        // 2. MAP SETUP
        let map = L.map('map', { zoomControl: false, attributionControl: false }).setView([41.3, 69.2], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let markersGroup = L.layerGroup().addTo(map);
        let allPlaces = [];

        // 3. VAQT SADOSI (BONUS FUNKSIYA)
        function playTimeSound(year) {
            try {
                let ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = ctx.createOscillator();
                let g = ctx.createGain();
                osc.type = year > 2024 ? 'sawtooth' : 'sine';
                osc.frequency.setValueAtTime(year / 4, ctx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.1);
                osc.connect(g); g.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch(e) {}
        }

        // 4. VAQT MASHINASI (ERA SYSTEM)
        async function travelToYear(year) {
            document.getElementById('yearLabel').innerText = year;
            let m = document.getElementById('map');
            
            // Era effektlari
            if(year < 1850) m.className = "past";
            else if(year > 2060) m.className = "future";
            else m.className = "";

            playTimeSound(year);
            filterData(year);
        }

        // 5. LOAD DATA
        async function loadData() {
            let { data, error } = await db.from('places').select('*');
            if(error) { console.log(error); return; }
            allPlaces = data || [];
            travelToYear(2024); // Boshlang'ich yuklash
        }

        function filterData(year) {
            let filtered = allPlaces.filter(p => Math.abs(p.era - year) <= 100);
            render(filtered);
        }

        function render(arr) {
            markersGroup.clearLayers();
            arr.forEach(p => {
                let m = L.marker([p.lat, p.lng]).addTo(markersGroup);
                m.on('click', () => {
                    document.getElementById('infoCard').style.display = "block";
                    document.getElementById('cardContent').innerHTML = `
                        <h2 style="color:var(--gold);margin:0">${p.name}</h2>
                        <span style="color:var(--neon);font-size:12px">${p.era}-yil</span>
                        <img src="${p.image_url || 'https://picsum.photos'}" onerror="this.src='https://picsum.photos/400/300'">
                        <p>${p.description || ''}</p>
                    `;
                });
            });
        }

        // 6. TOOLS
        function search(q) {
            q = q.toLowerCase();
            render(allPlaces.filter(p => p.name?.toLowerCase().includes(q)));
        }

        function nearby() {
            navigator.geolocation.getCurrentPosition(pos => {
                map.setView([pos.coords.latitude, pos.coords.longitude], 14);
                let sorted = [...allPlaces].sort((a,b) => 
                    Math.hypot(a.lat - pos.coords.latitude, a.lng - pos.coords.longitude) -
                    Math.hypot(b.lat - pos.coords.latitude, b.lng - pos.coords.longitude)
                );
                render(sorted.slice(0, 5));
            });
        }

        function ai() { alert("AI: Tarix sirlarini kashf etish uchun slayderni 1400-yilga suring!"); }

        function toggle3D() {
            let el = document.getElementById('map');
            el.style.transform = el.style.transform.includes("45deg") ? "none" : "perspective(1200px) rotateX(45deg)";
        }

        function closeCard() { document.getElementById('infoCard').style.display = "none"; }

        // START
        window.onload = () => {
            setTimeout(() => {
                map.invalidateSize(); 
                loadData();
            }, 400);
        };
    </script>
</body>
</html>
