<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>TimeMap PORTAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Kutubxonalar -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <script src="https://jsdelivr.net"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; height: 100%; width: 100%; background: #010409; }
        .ui { position: absolute; z-index: 1000; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: gold; padding: 20px; border-radius: 15px; border: 1px solid gold; text-align: center; }
        input[type=range] { width: 150px; appearance: slider-vertical; height: 200px; cursor: pointer; }
    </style>
</head>
<body onmousedown="if(!window.audioCtx) window.audioCtx = new AudioContext()">

    <div id="map"></div>

    <div class="ui">
        <div id="yearText" style="font-size: 24px; font-weight: bold;">2024</div>
        <input type="range" min="1400" max="2100" value="2024" oninput="shift(this.value)">
    </div>

    <script>
        // Xaritani majburan uyg'otish funksiyasi
        var map = L.map('map', {zoomControl: false}).setView([39.65, 66.97], 12);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function shift(v) {
            document.getElementById('yearText').innerText = v;
            // Ovoz va effektlar kodi...
            if(v < 1800) document.getElementById('map').style.filter = "sepia(1)";
            else if(v > 2060) document.getElementById('map').style.filter = "hue-rotate(180deg)";
            else document.getElementById('map').style.filter = "none";
        }

        // Qora ekranga qarshi 100% chora
        window.onload = function() {
            function fixMap() {
                map.invalidateSize();
                console.log("Map resized");
            }
            fixMap();
            setTimeout(fixMap, 500);
            setInterval(fixMap, 2000);
        };
    </script>
</body>
</html>
