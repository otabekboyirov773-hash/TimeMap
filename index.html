<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeMap ULTRA</title>

<!-- ✅ TO‘G‘RI CDN -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
--gold:#FFD700;
--neon:#00F3FF;
--purple:#BC00FF;
--glass:rgba(10,10,15,0.85);
}

body,html{
margin:0;height:100%;background:#000;color:white;
font-family:sans-serif;overflow:hidden;
}

#map{
position:absolute;width:100%;height:100%;
transition:0.8s;
}

/* INTRO */
#splash{
position:fixed;width:100%;height:100%;
background:black;display:flex;align-items:center;justify-content:center;
z-index:9999;cursor:pointer;
}
#dot{
width:8px;height:8px;background:#fff;border-radius:50%;
box-shadow:0 0 40px #fff;transition:1.5s;
}
.explode #dot{transform:scale(1200);opacity:0}

/* UI */
.ui{position:absolute;z-index:1000}
.glass{
background:var(--glass);
backdrop-filter:blur(20px);
border-radius:20px;
padding:10px;
}

/* LOGO */
.logo span{
color:var(--neon);
animation:glow 2s infinite alternate;
}
@keyframes glow{
from{text-shadow:0 0 5px #00f3ff;}
to{text-shadow:0 0 25px #00f3ff;}
}

/* WALLET */
.wallet{
top:20px;right:20px;
display:flex;gap:10px;align-items:center;
border:1px solid var(--gold);
}
.coin-spin{
animation:spin 4s linear infinite;
}
@keyframes spin{
100%{transform:rotateY(360deg);}
}

/* PANEL */
.panel{
top:20px;left:20px;
}

/* SLIDER */
.slider{
right:20px;top:50%;
transform:translateY(-50%);
}

/* BUTTON */
button{
margin-top:5px;
padding:10px;
border:none;
border-radius:10px;
background:#00f3ff;
cursor:pointer;
}

/* RADAR */
#radar{
top:100px;left:50%;
transform:translateX(-50%);
display:none;
}
</style>
</head>

<body onmousedown="initAudio()">

<!-- INTRO -->
<div id="splash" onclick="startApp()">
<div id="dot"></div>
</div>

<div id="map"></div>

<!-- LOGO -->
<div class="ui glass panel">
<div class="logo">TIME<span id="logoText">MAP</span></div>
<button onclick="smartAI()">🧠 AI</button>
<button onclick="startHunt()">🏆 Hunt</button>
<button onclick="toggle3D()">3D</button>
</div>

<!-- WALLET -->
<div class="ui glass wallet">
<span id="coin">200</span>
<span class="coin-spin">🪙</span>
</div>

<!-- SLIDER -->
<div class="ui glass slider">
<input type="range" min="1400" max="2100" value="2024" oninput="timeTravel(this.value)">
<div id="year">2024</div>
</div>

<!-- RADAR -->
<div id="radar" class="ui glass">Signal qidirilmoqda...</div>

<script>

/* ================= DB ================= */
const db = supabase.createClient(
"https://dfxothberdebqvxopiic.supabase.co",
"sb_publishable_g12t45A3qd15z2DML2g1og_poyavfk0"
);

/* ================= MAP ================= */
var map = L.map('map',{zoomControl:false}).setView([41.31,69.27],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

setTimeout(()=>map.invalidateSize(),500);

/* ================= INTRO ================= */
function startApp(){
document.getElementById("splash").classList.add("explode");
speak("TimeMap ga xush kelibsiz");
setTimeout(()=>{
document.getElementById("splash").style.display="none";
load();
},1500);
}

/* ================= AUDIO ================= */
let audioCtx;
function initAudio(){
if(!audioCtx) audioCtx=new AudioContext();
}

/* ================= VOICE ================= */
function speak(t){
let m=new SpeechSynthesisUtterance(t);
m.lang="uz-UZ";
speechSynthesis.speak(m);
}

/* ================= LOGO CHANGE ================= */
setInterval(()=>{
let el=document.getElementById("logoText");
el.innerText = el.innerText==="MAP" ? "AI" : "MAP";
},3000);

/* ================= WALLET ================= */
let coin=200;
function addCoin(c){
coin+=c;
document.getElementById("coin").innerText=coin;
}

/* ================= DATA ================= */
let places=[];
let markers=[];

async function load(){
let {data}=await db.from("places").select("*");
places=data||[];
timeTravel(2024);
}

/* ================= MARKERS ================= */
function renderMarkers(y){
markers.forEach(m=>map.removeLayer(m));
markers=[];

places.filter(p=>Math.abs(p.era-y)<=120).forEach(p=>{
let m=L.marker([p.lat,p.lng]).addTo(map);
m.on('click',()=>alert(p.name?.uz || p.name));
markers.push(m);
});
}

/* ================= TIME ================= */
function timeTravel(y){
document.getElementById("year").innerText=y;

if(y<1800){
document.getElementById("map").style.filter="sepia(0.6)";
}
else if(y>2050){
document.getElementById("map").style.filter="hue-rotate(160deg)";
}
else{
document.getElementById("map").style.filter="none";
}

renderMarkers(y);
}

/* ================= AI ================= */
function smartAI(){
if(places.length===0){
alert("data yo‘q");
return;
}

let c=map.getCenter();

let best=places.map(p=>{
let d=Math.sqrt(
Math.pow(p.lat-c.lat,2)+
Math.pow(p.lng-c.lng,2)
);
return {...p,score:(p.rating||1)*10-d*100};
}).sort((a,b)=>b.score-a.score)[0];

map.setView([best.lat,best.lng],15);
speak("Eng yaxshi joy topildi");
}

/* ================= HUNT ================= */
let treasure={lat:39.654,lng:66.975};
let hunt=false;

function startHunt(){
hunt=true;
document.getElementById("radar").style.display="block";
}

map.on('move',()=>{
if(!hunt) return;

let c=map.getCenter();
let d=Math.sqrt(
Math.pow(c.lat-treasure.lat,2)+
Math.pow(c.lng-treasure.lng,2)
);

if(d<0.01){
hunt=false;
addCoin(500);
alert("🎉 Xazina topildi!");
document.getElementById("radar").style.display="none";
}
});

/* ================= 3D ================= */
function toggle3D(){
let m=document.getElementById("map");
m.style.transform = m.style.transform.includes("45deg")
? "none"
: "perspective(1200px) rotateX(45deg) scale(1.1)";
}

</script>
</body>
</html>
