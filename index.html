<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TimeMap FINAL STABLE</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:sans-serif;}
#map{height:100vh;width:100%;background:#222;}

.status{
position:absolute;
top:10px;left:10px;
background:black;color:#0f0;
padding:8px;border-radius:10px;
z-index:1000;
font-size:12px;
}

.top{
position:absolute;top:50px;left:10px;right:10px;
z-index:1000;
}
.top input{
width:100%;padding:10px;border-radius:10px;border:none;
}

.card{
position:absolute;bottom:0;left:0;right:0;
background:#111;color:white;
padding:15px;border-radius:20px 20px 0 0;
display:none;
}
.card img{width:100%;border-radius:10px;}
</style>
</head>

<body>

<div id="map"></div>

<div class="status" id="status">⏳ Yuklanmoqda...</div>

<div class="top">
<input placeholder="🔍 Qidiruv..." oninput="search(this.value)">
</div>

<div class="card" id="card"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// STATUS
function setStatus(t){
document.getElementById("status").innerText=t;
console.log(t);
}

// GLOBAL ERROR CATCH
window.onerror = function(msg){
setStatus("❌ JS xato: " + msg);
};

// MAP INIT SAFE
let map;

try{

map = L.map('map').setView([41.3,69.2],6);

let layer = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:19}
);

layer.addTo(map);

// TILE ERROR HANDLER
layer.on('tileerror',()=>{
setStatus("⚠️ Tile yuklanmadi (internet yoki blok)");
});

setStatus("✅ Xarita ishlayapti");

}catch(e){

setStatus("❌ Leaflet yuklanmadi");

}

// DATA (LOCAL TEST)
let data=[
{name:"Toshkent",lat:41.3,lng:69.2,img:"https://picsum.photos/400"},
{name:"Samarqand",lat:39.6,lng:66.9,img:"https://picsum.photos/401"}
];

let markers=[];

// RENDER
function render(arr){

markers.forEach(m=>map.removeLayer(m));
markers=[];

arr.forEach(p=>{
if(!p.lat) return;

let m=L.marker([p.lat,p.lng]).addTo(map);

m.on('click',()=>show(p));

markers.push(m);

});

}

// CARD
function show(p){
card.style.display="block";
card.innerHTML=`
<h3>${p.name}</h3>
<img src="${p.img}">
`;
}

// SEARCH
function search(q){
q=q.toLowerCase();
render(data.filter(p=>p.name.toLowerCase().includes(q)));
}

// START
render(data);

</script>

</body>
</html>
