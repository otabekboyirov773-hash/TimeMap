<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TimeMap PRO UI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* ===== BASE ===== */
body{
margin:0;
font-family:system-ui;
background:#0f172a;
color:white;
}

#map{height:100vh;}

/* ===== TOP SEARCH ===== */
.searchBox{
position:absolute;
top:15px;
left:10px;
right:10px;
z-index:1000;
}

.searchBox input{
width:100%;
padding:14px;
border-radius:14px;
border:none;
font-size:16px;
background:rgba(0,0,0,0.6);
color:white;
backdrop-filter:blur(10px);
}

/* ===== ACTION BUTTONS ===== */
.actions{
position:absolute;
bottom:20px;
left:10px;
right:10px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
z-index:1000;
}

.actions button{
padding:12px;
border:none;
border-radius:14px;
background:rgba(0,0,0,0.6);
color:white;
font-weight:bold;
backdrop-filter:blur(10px);
}

/* ===== CARD ===== */
.card{
position:absolute;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(20px);
border-radius:25px 25px 0 0;
padding:15px;
display:none;
max-height:70%;
overflow:auto;
z-index:1000;
}

.card img{
width:100%;
border-radius:15px;
margin-top:10px;
}

/* ===== BADGES ===== */
.badge{
display:inline-block;
padding:5px 10px;
border-radius:10px;
font-size:12px;
margin-top:5px;
background:#22c55e;
}

.vip{
background:gold;
color:black;
}

/* ===== CTA ===== */
.cta{
margin-top:10px;
padding:12px;
background:#22c55e;
border-radius:12px;
text-align:center;
font-weight:bold;
}

/* ===== STATUS ===== */
.status{
position:absolute;
top:70px;
left:10px;
background:black;
color:#0f0;
padding:6px;
border-radius:8px;
z-index:1000;
font-size:12px;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="searchBox">
<input placeholder="🔍 Qidiruv..." oninput="search(this.value)">
</div>

<div class="status" id="status">⏳ Yuklanmoqda...</div>

<div class="card" id="card"></div>

<div class="actions">
<button onclick="nearby()">📍</button>
<button onclick="ai()">🧠</button>
<button onclick="topPlaces()">🔥</button>
<button onclick="showAd()">💰</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// ===== STATUS =====
function setStatus(t){
status.innerText=t;
}

// ===== MAP =====
let map=L.map('map').setView([41.3,69.2],6);

let layer=L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
).addTo(map);

layer.on('tileerror',()=>setStatus("⚠️ Internet muammo"));

// ===== DATA =====
let data=[],markers=[];

// SHEET + CACHE
const SHEET="https://opensheet.elk.sh/1Hedps20_fmQ9CB6QavBVedQNtdk7f6Zb8P8fkxeH70w/1";

let cache=localStorage.getItem("cache");

if(cache){
data=JSON.parse(cache);
render(data);
setStatus("⚡ Cache");
}

fetch(SHEET+"?t="+Date.now())
.then(r=>r.json())
.then(d=>{
data=d.map(x=>({
name:x.Name,
lat:+x.Lat,
lng:+x.Lng,
img:x.OldImage||x.NewImage,
rating:Math.random()*5,
vip:Math.random()>0.7
}));
localStorage.setItem("cache",JSON.stringify(data));
render(data);
setStatus("✅ Yangilandi");
})
.catch(()=>setStatus("⚠️ Sheet ishlamadi"));

// ===== IMAGE =====
function imgFix(url){
return url?url+"?v="+Date.now():"https://picsum.photos/400/300";
}

// ===== RENDER =====
function render(arr){

markers.forEach(m=>map.removeLayer(m));
markers=[];

arr.forEach(p=>{

let icon=p.vip
?L.icon({iconUrl:"https://cdn-icons-png.flaticon.com/512/1828/1828884.png",iconSize:[30,30]})
:undefined;

let m=L.marker([p.lat,p.lng],icon?{icon}:{}).addTo(map);

m.on('click',()=>showCard(p));

markers.push(m);

});

}

// ===== CARD =====
function showCard(p){

card.style.display="block";

card.innerHTML=`
<h2>${p.name} ${p.vip?"<span class='badge vip'>VIP</span>":""}</h2>

<img src="${imgFix(p.img)}">

<div class="badge">⭐ ${p.rating.toFixed(1)}</div>
<div class="badge">🔥 Trend</div>

<div class="cta">🚀 Shu joyga borish</div>

<div class="cta">💰 Biznesingizni reklama qiling</div>
`;

}

// ===== SEARCH =====
function search(q){
q=q.toLowerCase();
render(data.filter(p=>p.name.toLowerCase().includes(q)));
}

// ===== NEARBY =====
function nearby(){
navigator.geolocation.getCurrentPosition(pos=>{
let sorted=[...data].sort((a,b)=>
Math.hypot(a.lat-pos.coords.latitude,a.lng-pos.coords.longitude)-
Math.hypot(b.lat-pos.coords.latitude,b.lng-pos.coords.longitude)
);
render(sorted.slice(0,5));
});
}

// ===== AI =====
function ai(){
render([...data].sort(()=>0.5-Math.random()).slice(0,5));
setStatus("🤖 AI tavsiya berdi");
}

// ===== TOP =====
function topPlaces(){
render([...data].sort(()=>0.5-Math.random()).slice(0,5));
}

// ===== ADS =====
function showAd(){
alert("💰 Reklama berish uchun biz bilan bog‘laning");
}

</script>

</body>
</html>
