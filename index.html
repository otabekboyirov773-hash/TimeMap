<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeMap PRO</title>

<!-- MAP -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body,html{margin:0;height:100%;background:#000;color:#fff;font-family:sans-serif;}
#map{height:100%}
.ui{position:absolute;z-index:1000}
.top{top:10px;left:10px;right:10px;display:flex;justify-content:space-between}
.wallet{color:gold;font-size:20px}
.dock{bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px}
.btn{width:60px;height:60px;background:#111;border:none;border-radius:15px;color:#fff;font-size:22px}
</style>
</head>

<body>

<div id="map"></div>

<div class="ui top">
  <div>TIME<span style="color:cyan">MAP</span></div>
  <div class="wallet">🪙 <span id="balance">0</span></div>
</div>

<div class="ui dock">
  <button class="btn" onclick="locate()">📍</button>
  <button class="btn" onclick="ai()">🧠</button>
  <button class="btn" onclick="spawnCoin()">💰</button>
</div>

<script>
// ================= SUPABASE =================
const db = supabase.createClient(
"https://dfxothberdebqvxopiic.supabase.co",
"sb_publishable_g12t45A3qd15z2DML2g1og_poyavfk0"
);

// ================= MAP =================
const map = L.map('map').setView([41.31,69.27], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= USER =================
let uid = localStorage.getItem("uid") || crypto.randomUUID();
localStorage.setItem("uid", uid);

// ================= WALLET =================
async function loadWallet(){
 let {data} = await db.from("users").select("*").eq("id",uid).single();
 if(!data){
  await db.from("users").insert({id:uid,coins:200});
  document.getElementById("balance").innerText=200;
 }else{
  document.getElementById("balance").innerText=data.coins;
 }
}

async function addCoin(val){
 let {data} = await db.from("users").select("coins").eq("id",uid).single();
 let newVal = data.coins + val;
 await db.from("users").update({coins:newVal}).eq("id",uid);
 document.getElementById("balance").innerText=newVal;
}

// ================= AI =================
function ai(){
 speak("Sun'iy intellekt analiz qilmoqda");
 setTimeout(()=>{
   speak("Siz tarixiy hududdasiz. Bu joy qadimiy savdo yo‘llari bilan mashhur.");
 },1000);
}

// ================= VOICE =================
function speak(t){
 let m = new SpeechSynthesisUtterance(t);
 m.lang="uz-UZ";
 speechSynthesis.speak(m);
}

// ================= LOCATION + WEATHER =================
function locate(){
 map.locate({setView:true,maxZoom:15});
 map.on("locationfound", async e=>{
   let lat=e.latlng.lat;
   let lng=e.latlng.lng;

   speak("Joylashuv aniqlandi");

   // 🌦 OB-HAVO
   let res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
   let data = await res.json();
   alert(`🌤 ${data.current_weather.temperature}°C`);
 });
}

// ================= COIN =================
function spawnCoin(){
 let lat=41+Math.random();
 let lng=69+Math.random();

 let c = L.circleMarker([lat,lng],{radius:10,color:"gold"}).addTo(map);

 c.on("click",()=>{
   addCoin(100);
   speak("Koin topildi");
   map.removeLayer(c);
 });
}

// ================= VIP =================
let vipPlace = L.marker([39.65,66.97]).addTo(map);

vipPlace.on("click",()=>{
 alert("🔒 VIP JOY\nTelegram orqali ochiladi");
 window.open("https://t.me/TimeMap0");
});

// ================= INIT =================
loadWallet();
spawnCoin();

</script>
</body>
</html>
