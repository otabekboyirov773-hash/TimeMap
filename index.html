<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeMap | Portal Pro Max</title>
    
    <!-- Kutubxonalar - Qat'iy HTTPS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>
    <script src="https://jsdelivr.net"></script>
    
    <style>
        :root { --gold: #ffd700; --neon: #00f3ff; --glass: rgba(10, 15, 30, 0.95); }
        
        /* Xarita butun ekranni egallashi shart */
        html, body { height: 100%; margin: 0; padding: 0; background: #000; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; background: #010409; }

        /* UI Elementlar */
        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }

        /* Slayder */
        .time-machine { right: 20px; top: 50%; transform: translateY(-50%); padding: 25px 15px; display: flex; flex-direction: column; align-items: center; }
        .v-range { appearance: slider-vertical; width: 15px; height: 300px; background: var(--gold); border-radius: 10px; cursor: pointer; }

        .dock { bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        .btn { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; font-size: 26px; color: white; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .btn-ai { background: linear-gradient(135deg, #00f3ff, #bc00ff); box-shadow: 0 0 20px var(--neon); }

        /* Effektlar */
        .past { filter: sepia(0.6) contrast(1.1) brightness(0.9) !important; }
        .future { filter: hue-rotate(170deg) saturate(1.6) brightness(1.1) !important; }
        
        .coin-box { top: 25px; right: 25px; padding: 10px 20px; color: var(--gold); border: 2px solid var(--gold); font-weight: bold; }
        #yearText { font-weight: bold; color: var(--gold); margin-bottom: 15px; font-size: 24px; text-shadow: 0 0 10px var(--gold); }
    </style>
</head>
<body onclick="initAudio()"> <!-- Birinchi marta bosganda ovoz tizimi faollashadi -->

    <div id="map"></div>

    <div class="ui coin-box glass">🪙 <span id="tc">500</span> TC</div>

    <div class="ui time-machine glass">
        <span id="yearText">2024</span>
        <input type="range" class="v-range" min="1400" max="2100" value="2024" oninput="timeShift(this.value)">
    </div>

    <div class="ui dock">
        <button class="btn glass" onclick="map.locate({setView: true, maxZoom: 15})">📍</button>
        <button class="btn btn-ai" onclick="alert('AI: Slayderni suring, men o‘tmish va kelajakni tahlil qilaman!')">🧠</button>
        <button class="btn glass" onclick="toggle3D()">🧭</button>
    </div>

    <script>
        // 1. SUPABASE CONNECTION
        const URL = "https://supabase.co";
        const KEY = "sb_publishable_g12t45A3qd15z2DML2g1og_poyavfk0"; 
        const supabaseClient = supabase.createClient(URL, KEY);

        // 2. MAP SETUP
        var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.654, 66.975], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        var markersGroup = L.layerGroup().addTo(map);

        // 3. AUDIO ENGINE (OTLAR VA MASHINALAR)
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playSound(year) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();

            if (year < 1850) { 
                // OT TUYOQLARI (Ritmik qisqa zarbalar)
                osc.type = 'square';
                osc.frequency.setValueAtTime(40, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            } else if (year > 2060) {
                // UCHAR MASHINA (G'uvullash)
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
            } else {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            }

            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }

        // 4. VAQTNI O'ZGARTIRISH
        async function timeShift(y) {
            document.getElementById('yearText').innerText = y;
            let mDiv = document.getElementById('map');
            if(y < 1850) mDiv.className = "past"; 
            else if(y > 2060) mDiv.className = "future"; 
            else mDiv.className = "";

            playSound(y);
            loadPoints(y);
        }

        async function loadPoints(y) {
            const { data } = await supabaseClient.from('places').select('*');
            if (data) {
                markersGroup.clearLayers();
                data.filter(p => Math.abs(p.era - y) <= 100).forEach(p => {
                    L.marker([p.lat, p.lng]).addTo(markersGroup).bindPopup(`<b>${p.name}</b><br>${p.description}`);
                });
            }
        }

        function toggle3D() {
            let el = document.getElementById('map');
            el.style.transform = el.style.transform.includes("45deg") ? "none" : "perspective(1200px) rotateX(45deg)";
        }

        // 5. XARITANI MAJBURIY UYG'OTISH (GitHub uchun)
        window.onload = () => {
            setTimeout(() => {
                map.invalidateSize(); // Qora ekranni yo'qotadi
                timeShift(2024);
            }, 500);
        };
    </script>
</body>
</html>

</html>
