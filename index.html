<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeMap WOW</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body,html{margin:0;height:100%;background:#000;color:white;font-family:sans-serif;overflow:hidden;}
#map{width:100%;height:100%;}

/* BIG BANG */
#splash{
 position:fixed;width:100%;height:100%;background:#000;
 display:flex;align-items:center;justify-content:center;z-index:9999;
}
#dot{
 width:6px;height:6px;background:white;border-radius:50%;
 box-shadow:0 0 30px white;transition:1.5s;
}
.explode #dot{transform:scale(1000);opacity:0;}

.ui{position:absolute;z-index:1000;background:rgba(0,0,0,0.7);padding:10px;border-radius:10px;}
.top{top:20px;left:20px;}
.controls{bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:10px;}

.btn{padding:10px;border:none;border-radius:8px;background:#00f3ff;cursor:pointer;}
.locked{color:red;font-weight:bold;}
</style>
</head>

<body>

<div id="splash" onclick="startApp()">
  <div id="dot"></div>
</div>

<div id="map"></div>

<div class="ui top">
  🪙 <span id="coins">0</span>
</div>

<div class="ui controls">
  <button class="btn" onclick="smartAI()">🧠 AI</button>
  <button class="btn" onclick="timeTravel(1400)">⏳ 1400</button>
  <button class="btn" onclick="timeTravel(2100)">🚀 2100</button>
</div>

<script>
const db = supabase.createClient(
 "https://dfxothberdebqvxopiic.supabase.co",
 "sb_publishable_g12t45A3qd15z2DML2g1og_poyavfk0"
);

let map = L.map('map').setView([41.31,69.27],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let coins = 200;
let places = [];

/* BIG BANG */
function startApp(){
 document.getElementById("splash").classList.add("explode");

 speak("TimeMapga xush kelibsiz. Siz vaqt bo‘ylab sayohat qila olasiz.");

 setTimeout(()=>{
   document.getElementById("splash").style.display="none";
   map.invalidateSize();
   loadPlaces();
   autoLocate();
 },1500);
}

/* AI VOICE */
function speak(t){
 let m=new SpeechSynthesisUtterance(t);
 m.lang="uz-UZ";
 speechSynthesis.speak(m);
}

/* TIME TRAVEL */
function timeTravel(year){
 if(year<1800) map.getContainer().style.filter="sepia(1)";
 else map.getContainer().style.filter="hue-rotate(150deg)";
}

/* LOAD PLACES */
async function loadPlaces(){
 let {data}=await db.from("places").select("*");
 places=data||[];

 places.forEach((p,i)=>{
   let m=L.marker([p.lat,p.lng]).addTo(map);

   m.on('click',()=>{
     if(i<20){ // 🔒 20 ta blok
       alert("🔒 Bu joy yopiq.\nInvestor bo‘ling: t.me/TimeMap0");
       return;
     }

     alert(p.name);
     speak(p.name);
   });
 });
}

/* DAILY COIN */
let hiddenCoin = {
 lat:41.3 + Math.random()/10,
 lng:69.2 + Math.random()/10
};

map.on('click',e=>{
 let d = map.distance(e.latlng,[hiddenCoin.lat,hiddenCoin.lng]);

 if(d < 50){
   coins+=100;
   document.getElementById("coins").innerText=coins;
   alert("🎉 Yashirin coin topildi!");
   hiddenCoin = {
     lat:41.3 + Math.random()/10,
     lng:69.2 + Math.random()/10
   };
 }
});

/* AI TOP 5 */
function smartAI(){
 let center=map.getCenter();

 let sorted=places.map(p=>{
   return {...p,dist:map.distance(center,[p.lat,p.lng])};
 }).sort((a,b)=>a.dist-b.dist).slice(0,5);

 let text="Yaqin joylar:\n";
 sorted.forEach((p,i)=>text+=`${i+1}. ${p.name}\n`);

 alert(text);
 speak(text);
}

/* GEO + INFO */
function autoLocate(){
 map.locate({setView:true});

 map.on('locationfound',async e=>{
   let lat=e.latlng.lat;
   let lng=e.latlng.lng;

   speak("Sizning hududingiz aniqlanmoqda");

   // Weather
   fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`)
   .then(r=>r.json())
   .then(d=>{
     speak(`Havo harorati ${Math.round(d.current_weather.temperature)} daraja`);
   });

   // Prayer
   fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=2`)
   .then(r=>r.json())
   .then(d=>{
     let t=d.data.timings;
     console.log(t);
   });
 });
}
</script>

</body>
</html>
