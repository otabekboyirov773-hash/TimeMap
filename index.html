<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>TimeMap PORTAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Leaflet Kutubxonalari (SHU YERDA XATO BOR EDI) -->
    <link rel="stylesheet" href="https://unpkg.com" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        /* Xaritani majburan ko'rsatish uchun */
        #map { 
            position: absolute; 
            top: 0; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            height: 100%; 
            width: 100%; 
            background: #010409; 
            z-index: 1;
        }
        .ui { 
            position: absolute; 
            z-index: 1000; 
            top: 20px; 
            right: 20px; 
            background: rgba(0,0,0,0.85); 
            color: #ffd700; 
            padding: 20px; 
            border-radius: 15px; 
            border: 1px solid #ffd700; 
            text-align: center; 
            backdrop-filter: blur(10px);
        }
        input[type=range] { width: 150px; appearance: slider-vertical; height: 200px; margin-top: 10px; cursor: pointer; }
        .past { filter: sepia(0.8) contrast(1.1); }
        .future { filter: hue-rotate(180deg) brightness(1.2); }
    </style>
</head>
<body onmousedown="if(!window.audioCtx) window.audioCtx = new (window.AudioContext || window.webkitAudioContext)();">

    <div id="map"></div>

    <div class="ui">
        <div id="yearDisplay" style="font-size: 26px; font-weight: bold;">2024</div>
        <input type="range" min="1400" max="2100" value="2024" oninput="moveTime(this.value)">
        <p style="font-size: 10px; color: #fff;">EKRANGA BOSING VA SURING</p>
    </div>

    <script>
        // XARITANI SAMARQAND REGISTONGA YO'NALTIRISH
        var map = L.map('map', {zoomControl: false}).setView([39.654, 66.975], 13);
        
        // OpenStreetMap qatlami
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19
        }).addTo(map);

        function moveTime(v) {
            document.getElementById('yearDisplay').innerText = v;
            var m = document.getElementById('map');
            
            // Effektlar
            if(v < 1850) m.className = "past";
            else if(v > 2060) m.className = "future";
            else m.className = "";
        }

        // QORA EKRANNI DAVOLASH (MAJBURIY UYG'OTISH)
        window.onload = function() {
            setTimeout(function() { 
                map.invalidateSize(); 
                console.log("Xarita yangilandi!");
            }, 500);
        };
    </script>
</body>
</html>
