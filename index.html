<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeMap ULTRA | Professional Edition</title>

    <!-- ✅ LEAFLET (TO'G'IRLANDI) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com"></script>
    
    <!-- ✅ SUPABASE & FONTS -->
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root { --gold:#FFD700; --neon:#00F3FF; --purple:#BC00FF; --glass:rgba(10,10,15,0.9); }
        body,html { margin:0; height:100%; background:#000; color:white; font-family:'Space Grotesk', sans-serif; overflow:hidden; }
        
        #map { position:absolute; width:100%; height:100%; transition:0.8s filter, 0.8s transform; background: #010409; }

        /* 🌌 INTRO BIG BANG */
        #splash { position:fixed; width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999; cursor:pointer; }
        #dot { width:8px; height:8px; background:#fff; border-radius:50%; box-shadow:0 0 40px #fff; transition:1.8s cubic-bezier(0.9, 0, 0.1, 1); }
        .explode #dot { transform:scale(1500); opacity:0; }

        /* 💎 GLASS UI ELEMENTS */
        .ui { position:absolute; z-index:1000; pointer-events: auto; }
        .glass { background:var(--glass); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.1); border-radius:24px; box-shadow:0 15px 50px rgba(0,0,0,0.8); }

        /* HEADER */
        .top-bar { top:20px; left:20px; right:20px; padding:15px 25px; display:flex; justify-content:space-between; align-items:center; }
        .logo { font-weight:700; letter-spacing:2px; font-size:18px; }
        .logo span { color:var(--neon); text-shadow:0 0 15px var(--neon); }

        /* WALLET */
        .wallet { display:flex; gap:10px; align-items:center; padding:8px 18px; border:1px solid var(--gold); border-radius:100px; background:rgba(255,215,0,0.1); }
        .coin-spin { animation:spin 4s linear infinite; font-size:20px; display: inline-block; }
        @keyframes spin { 100% { transform:rotateY(360deg); } }

        /* DOCK CONTROLS */
        .dock { bottom:30px; left:50%; transform:translateX(-50%); padding:10px 25px; display:flex; gap:15px; }
        .btn { width:60px; height:60px; border-radius:20px; border:none; cursor:pointer; font-size:24px; color:white; display:flex; align-items:center; justify-content:center; transition:0.3s; }
        .btn:hover { transform:translateY(-5px) scale(1.1); }
        .btn-ai { background:linear-gradient(135deg, var(--neon), var(--purple)); box-shadow:0 10px 30px rgba(0,243,255,0.4); }

        /* SLIDER */
        .time-panel { right:20px; top:50%; transform:translateY(-50%); padding:25px 15px; display:flex; flex-direction:column; align-items:center; }
        .v-slider { appearance:slider-vertical; width:10px; height:250px; background:var(--gold); border-radius:10px; cursor:pointer; outline: none; }
        #year { font-size:22px; font-weight:700; color:var(--gold); margin-top:15px; }

        /* 📡 RADAR HUD */
        #radar { top:100px; left:50%; transform:translateX(-50%); padding:15px 30px; display:none; border-left:4px solid var(--neon); font-weight:500; }
        
        /* ERA FILTERS */
        .era-past { filter: sepia(0.6) contrast(1.1) !important; }
        .era-future { filter: hue-rotate(160deg) saturate(1.5) !important; }
    </style>
</head>

<body onmousedown="initAudioContext()">

<!-- INTRO -->
<div id="splash" onclick="ignitePortal()">
    <div id="dot"></div>
    <div style="position:absolute; bottom:20%; font-size:12px; letter-spacing:5px; opacity:0.5;">SINGULYARLIKNI BOSING</div>
</div>

<div id="map"></div>

<!-- TOP HUB -->
<div class="ui glass top-bar">
    <div class="logo">TIME<span>MAP</span> ULTRA</div>
    <div class="wallet">
        <span id="coin-val">200</span>
        <span class="coin-spin">🪙</span>
    </div>
</div>

<!-- RADAR -->
<div id="radar" class="ui glass">
    <span id="radar-text">SIGNAL QIDIRILMOQDA...</span>
</div>

<!-- TIME ENGINE -->
<div class="ui glass time-panel">
    <input type="range" class="v-slider" min="1400" max="2100" value="2024" oninput="timeLeap(this.value)">
    <div id="year">2024</div>
</div>

<!-- DOCK BAR -->
<div class="ui glass dock">
    <button class="btn glass" onclick="autoLocate()">📍</button>
    <button class="btn btn-ai" onclick="smartAI()">🧠</button>
    <button class="btn glass" onclick="startHunt()">🏆</button>
    <button class="btn glass" onclick="toggle3D()">3D</button>
</div>

<script>
/* ================= ✅ CONFIG (STABLE) ================= */
const db = supabase.createClient(
    "https://supabase.co",
    "sb_publishable_g12t45A3qd15z2DML2g1og_poyavfk0"
);

// ✅ TILE LAYER TO'G'IRLANDI
var map = L.map('map', {zoomControl:false, attributionControl:false}).setView([41.31, 69.27], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19
}).addTo(map);

let audioCtx, places = [], markers = [], huntActive = false;
let treasure = {lat:39.654, lng:66.975, era: 1420}; 

function initAudioContext() { if(!audioCtx) audioCtx = new AudioContext(); }

/* ================= PORTAL START ================= */
function ignitePortal() {
    document.getElementById("splash").classList.add("explode");
    speak("Assalomu alaykum! TimeMap saytiga xush kelibsiz. Men sizning sun'iy intellekt yo'lboshchingizman.");
    
    setTimeout(() => {
        document.getElementById("splash").style.display = "none";
        map.invalidateSize(); // Majburiy chizish
        loadData();
    }, 1500);
}

function speak(t) {
    const m = new SpeechSynthesisUtterance(t);
    m.lang = "uz-UZ";
    m.rate = 0.95;
    window.speechSynthesis.speak(m);
}

/* ================= DATA ENGINE ================= */
async function loadData() {
    const { data, error } = await db.from("places").select("*");
    places = data || [];
    renderMarkers(2024);
}

function renderMarkers(y) {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    places.filter(p => Math.abs(p.era - y) <= 120).forEach(p => {
        const icon = L.divIcon({
            className: 'custom-marker',
            html: `<div style="background:var(--neon); width:12px; height:12px; border-radius:50%; box-shadow:0 0 15px var(--neon);"></div>`
        });
        let m = L.marker([p.lat, p.lng], {icon}).addTo(map);
        m.on('click', () => {
            speak(`Siz ${p.name?.uz || p.name} nuqtasini ko'ryapsiz.`);
            alert(p.description?.uz || p.description || p.name);
        });
        markers.push(m);
    });
}

/* ================= TIME MACHINE ================= */
function timeLeap(y) {
    document.getElementById("year").innerText = y;
    const mDiv = document.getElementById("map");

    if(y < 1850) mDiv.className = "era-past";
    else if(y > 2060) mDiv.className = "era-future";
    else mDiv.className = "";

    // SFX BEEP
    if(audioCtx) {
        let osc = audioCtx.createOscillator();
        let g = audioCtx.createGain();
        osc.frequency.value = y < 1850 ? 40 : 200;
        osc.connect(g); g.connect(audioCtx.destination);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    }
    renderMarkers(y);
}

/* ================= HUNT RADAR ================= */
function startHunt() {
    huntActive = true;
    document.getElementById("radar").style.display = "block";
    speak("Xazina qidiruvi boshlandi. Registon tomon harakatlaning.");
}

map.on('move', () => {
    if(!huntActive) return;
    let center = map.getCenter();
    let dist = map.distance(center, [treasure.lat, treasure.lng]);

    const radarText = document.getElementById("radar-text");
    if(dist < 5000) {
        radarText.innerText = `SIGNAL: ${Math.round(dist)}m`;
        if(dist < 100) {
            huntActive = false;
            let current = parseInt(document.getElementById("coin-val").innerText);
            document.getElementById("coin-val").innerText = current + 500;
            speak("Tabriklayman! Xazina topildi.");
            alert("🎉 XAZINA TOPILDI! +500 TC");
            document.getElementById("radar").style.display = "none";
        }
    } else {
        radarText.innerText = "SIGNAL YO'Q (Juda uzoqdasiz)";
    }
});

/* ================= TOOLS ================= */
function autoLocate() {
    map.locate({setView: true, maxZoom: 15});
    speak("Joylashuvingiz aniqlanmoqda.");
}

function toggle3D() {
    const m = document.getElementById('map');
    m.style.transform = m.style.transform.includes("45deg") ? "none" : "perspective(1200px) rotateX(45deg) scale(1.1)";
}

function smartAI() {
    speak("Yaqin atrofdagi eng yaxshi nuqtani tahlil qilyapman.");
    if(places.length > 0) {
        map.flyTo([places[0].lat, places[0].lng], 15);
    }
}
</script>
</body>
</html>
