<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TimeMap NEXT LEVEL</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;}
#map{height:100vh;}

/* UI */
.top{position:absolute;top:10px;left:10px;right:10px;z-index:1000;}
.top input{width:100%;padding:10px;border-radius:10px;border:none;}

.buttons{
position:absolute;bottom:10px;left:10px;right:10px;
display:grid;grid-template-columns:repeat(5,1fr);
gap:5px;z-index:1000;
}
.buttons button{
padding:10px;border:none;border-radius:10px;
background:#22c55e;color:white;
}

.card{
position:absolute;bottom:0;left:0;right:0;
background:#111;padding:15px;
border-radius:20px 20px 0 0;
display:none;
}
.card img{width:100%;border-radius:10px;}

.admin{
position:absolute;top:60px;left:10px;right:10px;
background:#111;padding:10px;border-radius:10px;
display:none;
}
.admin input{width:100%;margin:5px 0;padding:8px;border:none;border-radius:8px;}
</style>
</head>

<body>

<div id="map"></div>

<div class="top">
<input placeholder="🔍 Qidiruv..." oninput="search(this.value)">
</div>

<div class="card" id="card"></div>

<div class="admin" id="adminBox">

<input id="pass" placeholder="Parol">
<button onclick="login()">Kirish</button>

<div id="panel" style="display:none;">

<h3>➕ Joy qo‘shish</h3>
<input id="name" placeholder="Nom">
<input id="lat" placeholder="Lat">
<input id="lng" placeholder="Lng">
<input id="img" placeholder="Rasm">
<input id="vip" placeholder="VIP (ha/yoq)">
<button onclick="addPlace()">Qo‘shish</button>

<hr>

<input id="challengeInput" placeholder="Challenge">
<button onclick="saveChallenge()">Saqlash</button>

</div>

</div>

<div class="buttons">
<button onclick="nearby()">📍</button>
<button onclick="ai()">🧠</button>
<button onclick="toggle3D()">🧭</button>
<button onclick="toggleAdmin()">⚙️</button>
<button onclick="showChallenge()">🎯</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

// MAP
let map=L.map('map').setView([41.3,69.2],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// DATA
let data=[],markers=[],routeLine;
let local=JSON.parse(localStorage.getItem("places")||"[]");

// LOAD
fetch("https://opensheet.elk.sh/1Hedps20_fmQ9CB6QavBVedQNtdk7f6Zb8P8fkxeH70w/1")
.then(r=>r.json())
.then(d=>{
data=d.map(x=>({
name:x.Name,
lat:+x.Lat,
lng:+x.Lng,
img:x.OldImage||x.NewImage,
vip:x.VIP==="ha"
}));
merge();
})
.catch(()=>merge());

function merge(){
data=[...data,...local];
render(data);
}

// RENDER
function render(arr){

markers.forEach(m=>map.removeLayer(m));
markers=[];

arr.forEach(p=>{

let icon = p.vip
? L.icon({iconUrl:"https://cdn-icons-png.flaticon.com/512/1828/1828884.png",iconSize:[30,30]})
: undefined;

let m=L.marker([p.lat,p.lng],icon?{icon}:{}).addTo(map);

m.on('click',()=>show(p));

markers.push(m);

});
}

// CARD
function show(p){

card.style.display="block";

card.innerHTML=`
<h3>${p.name} ${p.vip?"⭐":""}</h3>
<img src="${p.img||'https://picsum.photos/400'}">
<button onclick="route(${p.lat},${p.lng})">🚗 Yo‘l</button>
`;

}

// ROUTE (ICHIDA)
function route(lat,lng){

navigator.geolocation.getCurrentPosition(pos=>{

let user=[pos.coords.latitude,pos.coords.longitude];
let dest=[lat,lng];

if(routeLine) map.removeLayer(routeLine);

routeLine=L.polyline([user,dest],{color:"lime"}).addTo(map);

map.fitBounds(routeLine.getBounds());

});

}

// SEARCH
function search(q){
q=q.toLowerCase();
render(data.filter(p=>p.name.toLowerCase().includes(q)));
}

// NEARBY
function nearby(){
navigator.geolocation.getCurrentPosition(pos=>{
let sorted=[...data].sort((a,b)=>
Math.hypot(a.lat-pos.coords.latitude,a.lng-pos.coords.longitude)-
Math.hypot(b.lat-pos.coords.latitude,b.lng-pos.coords.longitude)
);
render(sorted.slice(0,5));
});
}

// AI
function ai(){
render([...data].sort(()=>0.5-Math.random()).slice(0,5));
}

// ADMIN
function toggleAdmin(){
adminBox.style.display=
adminBox.style.display==="block"?"none":"block";
}

function login(){
if(pass.value==="1234") panel.style.display="block";
}

// ADD
function addPlace(){
let p={
name:name.value,
lat:+lat.value,
lng:+lng.value,
img:img.value,
vip:vip.value==="ha"
};
local.push(p);
localStorage.setItem("places",JSON.stringify(local));
merge();
}

// CHALLENGE
function saveChallenge(){
localStorage.setItem("challenge",challengeInput.value);
}

function showChallenge(){
alert(localStorage.getItem("challenge")||"yoq");
}

// 3D EFFECT
let is3D=false;
function toggle3D(){
let mapEl=document.getElementById("map");
is3D=!is3D;
mapEl.style.transform=is3D?"perspective(800px) rotateX(45deg)":"none";
}

</script>

</body>
</html>
