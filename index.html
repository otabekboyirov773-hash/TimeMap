<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeMap AI</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:sans-serif; }
#map { height:100vh; }

/* PANEL */
.panel{
position:absolute;
top:10px;
left:10px;
z-index:1000;
background:white;
padding:12px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
width:270px;
animation:fadeIn 0.7s;
}

input{
width:100%;
padding:8px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:5px;
}

button{
width:100%;
padding:8px;
margin-top:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{ transform:scale(1.05); }

.btn1{ background:#4CAF50;color:white;}
.btn2{ background:#2196F3;color:white;}
.btn3{ background:#ff5722;color:white;}
.btn4{ background:#9c27b0;color:white;}
.btn5{ background:#000;color:white;}

.popup-img{
width:100%;
border-radius:10px;
margin-top:5px;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(-20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="panel">
<input type="text" placeholder="🔍 Qidiruv..." oninput="search(this.value)">
<button class="btn1" onclick="challenge()">🎯 Challenge</button>
<button class="btn2" onclick="findNearest()">📍 Yaqin joy</button>
<button class="btn3" onclick="showTop()">🔥 Top joylar</button>
<button class="btn4" onclick="showAll()">🌍 Hammasi</button>
<button class="btn5" onclick="aiRecommend()">🤖 AI tavsiya</button>
<button onclick="login()">👤 Login</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([41.3,69.2],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 🔥 API
const MAIN_URL = "https://opensheet.elk.sh/1Hedps20_fmQ9CB6QavBVedQNtdk7f6Zb8P8fkxeH70w/1";
const EXTRA_URL = "https://opensheet.elk.sh/1W0z-nLeC3VEmDn00N5T2UxFoEl0g5bwGze55flXcAlw/1";

let mainData = [];
let extraData = [];
let markers = [];

// LOAD
Promise.all([
fetch(MAIN_URL).then(r=>r.json()),
fetch(EXTRA_URL).then(r=>r.json())
]).then(([main, extra])=>{

mainData = main.map(m=>({
...m,
Lat: parseFloat(m.Lat),
Lng: parseFloat(m.Lng),
Views: Number(m.Views)||0,
Rating: Number(m.Rating)||0
}));

extraData = extra;

render(mainData);

});

// RENDER
function render(data){

markers.forEach(m=>map.removeLayer(m));
markers=[];

data.forEach(m=>{

if(!m.Lat) return;

const e = extraData.find(x=>String(x.ID)===String(m.ID)) || {};

let likes = JSON.parse(localStorage.getItem("likes")||"{}");
let likeCount = likes[m.ID] || 0;

const marker = L.marker([m.Lat,m.Lng]).addTo(map);

marker.bindPopup(`
<b>${m.Name}</b><br>

⭐ ${m.Rating} | 👀 ${m.Views}<br>

${m.Access==="yes"?"♿ Qulay<br>":""}
${e.Secret==="yes"?"😳 Secret joy<br>":""}

<p>${m.Description||""}</p>

<img src="${m.OldImage}" class="popup-img">

<br>
<button onclick="likePlace('${m.ID}')">❤️ Like</button>
<span id="like-${m.ID}">${likeCount}</span>

<br><br>
<a href="https://www.google.com/maps/dir/?api=1&destination=${m.Lat},${m.Lng}" target="_blank">
🚗 Borish yo‘li
</a>
`);

markers.push(marker);

});

}

// SEARCH
function search(q){
q=q.trim().toLowerCase();

if(!q){ render(mainData); return; }

const res = mainData.filter(p =>
(p.Name||"").toLowerCase().includes(q) ||
(p.City||"").toLowerCase().includes(q) ||
(p.Category||"").toLowerCase().includes(q)
);

render(res);
}

// CHALLENGE
function challenge(){
const r = mainData[Math.floor(Math.random()*mainData.length)];
map.setView([r.Lat,r.Lng],14);
alert("🎯 Challenge: "+r.Name);
}

// NEAREST
function findNearest(){
navigator.geolocation.getCurrentPosition(pos=>{
const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

const nearest = mainData.sort((a,b)=>
Math.hypot(a.Lat-lat,a.Lng-lng) -
Math.hypot(b.Lat-lat,b.Lng-lng)
)[0];

map.setView([nearest.Lat,nearest.Lng],14);
alert("📍 Sizga yaqin: "+nearest.Name);
});
}

// TOP
function showTop(){
const top=[...mainData].sort((a,b)=>b.Views-a.Views).slice(0,10);
render(top);
}

function showAll(){ render(mainData); }

// ❤️ LIKE
function likePlace(id){
let likes = JSON.parse(localStorage.getItem("likes")||"{}");
likes[id]=(likes[id]||0)+1;
localStorage.setItem("likes",JSON.stringify(likes));
document.getElementById("like-"+id).innerText=likes[id];
}

// 👤 LOGIN
function login(){
let name = prompt("Ismingiz:");
if(name){
localStorage.setItem("user",name);
alert("Xush kelibsiz "+name);
}
}

// 🤖 AI RECOMMEND (ENG MUHIM)
function aiRecommend(){

// user history
let likes = JSON.parse(localStorage.getItem("likes")||"{}");

// eng ko‘p like qilingan kategoriya
let favCategory = null;
let max = 0;

mainData.forEach(p=>{
if(likes[p.ID] > max){
max = likes[p.ID];
favCategory = p.Category;
}
});

// agar like yo‘q bo‘lsa
if(!favCategory){
const random = mainData[Math.floor(Math.random()*mainData.length)];
map.setView([random.Lat,random.Lng],14);
alert("🤖 Tavsiya: "+random.Name);
return;
}

// kategoriya bo‘yicha tavsiya
const rec = mainData.filter(p=>p.Category===favCategory);

// random tanlash
const pick = rec[Math.floor(Math.random()*rec.length)];

map.setView([pick.Lat,pick.Lng],14);

alert("🤖 Sizga mos joy: "+pick.Name);

}

</script>

</body>
</html>
