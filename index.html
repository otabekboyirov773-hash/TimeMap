<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TimeMap Stable</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;}
#map{height:100vh;}

.top{
position:absolute;
top:10px;
left:10px;
right:10px;
z-index:1000;
}

.top input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
}

.adminBtn{
position:absolute;
top:60px;
right:10px;
z-index:1000;
padding:8px;
background:black;
color:white;
border-radius:8px;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="top">
<input placeholder="Qidiruv..." oninput="search(this.value)">
</div>

<button class="adminBtn" onclick="alert('Admin keyin qo‘shamiz')">⚙️</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
const map = L.map('map').setView([41.3, 69.2], 6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
maxZoom: 19
}).addTo(map);

// TEST DATA
let data = [
{ name:"Toshkent", lat:41.3111, lng:69.2797 },
{ name:"Samarqand", lat:39.6542, lng:66.9597 },
{ name:"Buxoro", lat:39.7747, lng:64.4286 }
];

// RENDER
function render(arr){

arr.forEach(p=>{
L.marker([p.lat, p.lng])
.addTo(map)
.bindPopup(p.name);
});

}

// SEARCH
function search(q){
q = q.toLowerCase();

let filtered = data.filter(p =>
p.name.toLowerCase().includes(q)
);

map.eachLayer(layer=>{
if(layer instanceof L.Marker) map.removeLayer(layer);
});

render(filtered);
}

// START
render(data);

</script>

</body>
</html>
