<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeMap Portal | Realistic Audio Edition</title>
    
    <link rel="stylesheet" href="https://jsdelivr.net" />
    <script src="https://jsdelivr.net"></script>
    <script src="https://jsdelivr.net"></script>
    
    <style>
        :root { --gold: #ffd700; --neon: #00f3ff; --glass: rgba(10, 15, 30, 0.9); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; background: #010409; transition: filter 0.8s ease; }
        .ui { position: absolute; z-index: 1000; }
        .glass { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .time-engine { right: 20px; top: 50%; transform: translateY(-50%); padding: 25px 15px; display: flex; flex-direction: column; align-items: center; }
        .v-range { appearance: slider-vertical; width: 12px; height: 300px; background: var(--gold); border-radius: 10px; cursor: pointer; }
        .dock { bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; }
        .btn { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; font-size: 26px; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-ai { background: linear-gradient(135deg, #00f3ff, #bc00ff); box-shadow: 0 0 25px rgba(0, 243, 255, 0.6); }
        .past { filter: sepia(0.6) contrast(1.1) brightness(0.8) !important; }
        .future { filter: hue-rotate(170deg) saturate(1.6) brightness(1.1) !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui time-engine glass">
        <span id="yearLabel" style="font-weight: bold; color: var(--gold); margin-bottom: 20px; font-size: 24px;">2024</span>
        <input type="range" class="v-range" min="1400" max="2100" value="2024" oninput="timeTravel(this.value)">
    </div>

    <div class="ui dock">
        <button class="btn glass" onclick="map.locate({setView: true})">📍</button>
        <button class="btn btn-ai" onclick="alert('AI: Atrofingizni o\'rganmoqdaman...')">🧠</button>
        <button class="btn glass" onclick="document.getElementById('map').style.transform = document.getElementById('map').style.transform.includes('45deg') ? 'none' : 'perspective(1200px) rotateX(45deg)'">🧭</button>
    </div>

    <script>
        const SB_URL = "https://supabase.co";
        const SB_KEY = "sb_publishable_g12t45A3qd15z2DML2g1og_poyavfk0"; 
        const db = supabase.createClient(SB_URL, SB_KEY);

        var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([41.31, 69.24], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // --- YANGI REALISTIK AUDIO MOTOR ---
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playRealisticSound(year) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            let filter = audioCtx.createBiquadFilter();

            if (year < 1850) { 
                // --- OT TUYOQLARI (Ritmik urilish) ---
                osc.type = 'square';
                osc.frequency.setValueAtTime(30, audioCtx.currentTime);
                filter.type = 'lowpass';
                filter.frequency.value = 400;
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
            } 
            else if (year > 2060) {
                // --- UCHAR MASHINA (G'uvullash/Drone) ---
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.5);
                filter.type = 'bandpass';
                filter.frequency.value = 1000;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            } else {
                // Standart o'tish ovozi
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
            }

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

        async function timeTravel(year) {
            document.getElementById('yearLabel').innerText = year;
            let m = document.getElementById('map');
            if(year < 1850) m.className = "past";
            else if(year > 2060) m.className = "future";
            else m.className = "";
            
            playRealisticSound(year);
        }

        window.onload = () => { setTimeout(() => { map.invalidateSize(); timeTravel(2024); }, 400); };
    </script>
</body>
</html>
