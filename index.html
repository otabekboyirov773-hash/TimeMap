<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TimeMap PRO MAX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;}
#map{height:100vh;}

.panel{
position:absolute;top:10px;left:10px;z-index:1000;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
padding:12px;border-radius:15px;
width:300px;
}

input,button{
width:100%;margin-top:6px;padding:9px;
border-radius:10px;border:none;
}

button{background:#22c55e;color:white;cursor:pointer;}

.popup-img{
width:100%;
border-radius:10px;
margin-top:5px;
}
</style>
</head>

<body>

<div class="panel">
<input placeholder="🔍 Qidiruv..." oninput="search(this.value)">
<button onclick="topNearby()">📍 Yaqin Top 5</button>
<button onclick="challenge()">🎯 Challenge</button>
<button onclick="aiRecommend()">🤖 AI</button>
<button onclick="showTop()">🔥 Top</button>
<button onclick="showLevel()">🏆 Level</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>

const map=L.map('map').setView([41.3,69.2],6);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let routingControl;

const URL="https://opensheet.elk.sh/1Hedps20_fmQ9CB6QavBVedQNtdk7f6Zb8P8fkxeH70w/1";

let data=[],markers=[];

// LOAD DATA
fetch(URL).then(r=>r.json()).then(d=>{
data=d.map(x=>({
...x,
Lat:+x.Lat,
Lng:+x.Lng,
Views:+x.Views||0
}));
render(data);
showAds();
});

// IMAGE FIX FUNCTION
function fixImg(url){
if(!url) return "https://via.placeholder.com/300";
return encodeURI(url);
}

// RENDER
function render(arr){

markers.forEach(m=>map.removeLayer(m));
markers=[];

arr.forEach(p=>{

if(!p.Lat) return;

let badge = p.Premium==="yes" ? "🔥 TOP JOY<br>" : "";

const m=L.marker([p.Lat,p.Lng]).addTo(map);

m.bindPopup(`
${badge}
<b>${p.Name}</b><br>
👀 ${p.Views}<br>

<img 
src="${fixImg(p.OldImage)}" 
class="popup-img"
loading="lazy"
onerror="this.src='https://via.placeholder.com/300'"
>

<br>
<button onclick="route(${p.Lat},${p.Lng})">🚗 Yo‘l</button>
<button onclick="like('${p.ID}','${p.Category}')">❤️</button>
<button onclick="share('${p.Name}')">📤</button>
`);

m.on('click',()=>increaseViews(p.ID));

markers.push(m);

});

}

// VIEW COUNT
function increaseViews(id){
let v=JSON.parse(localStorage.getItem("views")||"{}");
v[id]=(v[id]||0)+1;
localStorage.setItem("views",JSON.stringify(v));
}

// ROUTE
function route(lat,lng){

navigator.geolocation.getCurrentPosition(pos=>{

if(routingControl) map.removeControl(routingControl);

routingControl = L.Routing.control({
waypoints:[
L.latLng(pos.coords.latitude,pos.coords.longitude),
L.latLng(lat,lng)
]
}).addTo(map);

});

}

// SEARCH
function search(q){
q=q.toLowerCase();
render(data.filter(p=>
(p.Name||"").toLowerCase().includes(q)||
(p.City||"").toLowerCase().includes(q)
));
}

// TOP NEARBY
function topNearby(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude,lng=pos.coords.longitude;

let sorted=data.sort((a,b)=>
Math.hypot(a.Lat-lat,a.Lng-lng)-
Math.hypot(b.Lat-lat,b.Lng-lng)
);

render(sorted.slice(0,5));

alert("📍 Eng yaqin 5 joy");

});

}

// LIKE + AI
function like(id,cat){
let pref=JSON.parse(localStorage.getItem("pref")||"{}");
pref[cat]=(pref[cat]||0)+1;
localStorage.setItem("pref",JSON.stringify(pref));
}

// AI
function aiRecommend(){

let pref=JSON.parse(localStorage.getItem("pref")||"{}");

let fav=Object.keys(pref).sort((a,b)=>pref[b]-pref[a])[0];

let list=data.filter(p=>p.Category===fav);

if(list.length===0) list=data;

let r=list[Math.floor(Math.random()*list.length)];

map.setView([r.Lat,r.Lng],14);

alert("🤖 "+r.Name);

}

// CHALLENGE
function challenge(){

let r=data[Math.floor(Math.random()*data.length)];

let score=Number(localStorage.getItem("score")||0)+20;

localStorage.setItem("score",score);

map.setView([r.Lat,r.Lng],14);

alert(`🎯 ${r.Name}\n🏆 ${score}`);

}

// LEVEL
function showLevel(){

let score=Number(localStorage.getItem("score")||0);

let level="Bronze";
if(score>500) level="Silver";
if(score>1000) level="Gold";

alert(`🏆 ${level}\nBall: ${score}`);

}

// TOP
function showTop(){
render([...data].sort((a,b)=>b.Views-a.Views).slice(0,10));
}

// SHARE
function share(name){
navigator.clipboard.writeText("TimeMap: "+name);
alert("📤 Nusxa olindi");
}

// ADS
function showAds(){

let ads=data.filter(p=>p.Premium==="yes");

if(ads.length===0) return;

let r=ads[Math.floor(Math.random()*ads.length)];

setTimeout(()=>{
alert("🔥 Tavsiya: "+r.Name);
},3000);

}

</script>

</body>
</html>
