<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeMap Global 🚀</title>

<!-- ✅ TO‘G‘RI KUTUBXONALAR -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body,html{margin:0;height:100%;background:#000;color:white;font-family:sans-serif;}
#map{height:100%;}

.panel{
position:absolute;top:10px;left:10px;
background:#111;padding:10px;border-radius:10px;
z-index:1000;
}

.wallet{
position:absolute;top:10px;right:10px;
background:#111;padding:10px;border-radius:10px;
}

button{
padding:8px;margin-top:5px;border:none;
border-radius:8px;background:#00f3ff;
cursor:pointer;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">
<b>TimeMap 🌍</b><br>
<button onclick="runAI()">🧠 AI</button>
<button onclick="addPlace()">+ Joy</button>
<button onclick="autoLocate()">📍</button>
</div>

<div class="wallet">🪙 <span id="bal">200</span></div>

<script>

/* ================= CONFIG ================= */
const SB_URL="https://dfxothberdebqvxopiic.supabase.co";
const SB_KEY="sb_publishable_g12t45A3qd15z2DML2g1og_poyavfk0";

const db=supabase.createClient(SB_URL,SB_KEY);

/* ================= MAP ================= */
const map=L.map('map').setView([41.31,69.27],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let markers=[];
let allPlaces=[];
let balance=200;

/* ================= LOAD ================= */
async function loadPlaces(){
 const {data}=await db.from('places').select('*');
 allPlaces=data||[];
 render(allPlaces);
}

/* ================= RENDER ================= */
function render(list){
 markers.forEach(m=>map.removeLayer(m));
 markers=[];

 list.forEach(p=>{
  let color=p.is_locked?'red':(p.vip?'gold':'blue');

  let m=L.circleMarker([p.lat,p.lng],{
   radius:10,color:color
  }).addTo(map)
  .bindPopup(`
   <b>${p.name}</b><br>
   ${p.description||""}<br><br>
   <button onclick="openPlace('${p.id}')">Ochish</button>
  `);

  markers.push(m);
 });
}

/* ================= ADD ================= */
async function addPlace(){
 let name=prompt("Joy nomi:");
 let lat=map.getCenter().lat;
 let lng=map.getCenter().lng;

 await db.from('places').insert([
  {name,lat,lng,era:2024,is_locked:false}
 ]);

 loadPlaces();
}

/* ================= OPEN ================= */
function openPlace(id){
 let p=allPlaces.find(x=>x.id==id);

 if(p.is_locked){
   if(balance>=100){
     balance-=100;
     document.getElementById("bal").innerText=balance;
     alert("Sir ochildi 🔥");
   }else{
     alert("Coin yetarli emas");
   }
 }else{
   alert(p.name+" ochiq");
 }
}

/* ================= AI ================= */
function runAI(){
 if(allPlaces.length==0){alert("data yo‘q");return;}

 let r=allPlaces[Math.floor(Math.random()*allPlaces.length)];

 alert("AI tavsiya: "+r.name);
 map.setView([r.lat,r.lng],13);
}

/* ================= LOCATION ================= */
function autoLocate(){
 map.locate({setView:true});
}

/* ================= INIT ================= */
loadPlaces();
setTimeout(()=>map.invalidateSize(),500);

</script>

</body>
</html>
