<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TimeMap PRO MAX</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white;}
#map{height:100vh;}

.top{
position:absolute;top:10px;left:10px;right:10px;
display:flex;gap:5px;z-index:1000;
}

.top input{
flex:1;padding:12px;border-radius:12px;border:none;
}

.bottom{
position:absolute;bottom:10px;left:10px;right:10px;
display:grid;grid-template-columns:repeat(4,1fr);
gap:6px;z-index:1000;
}

.bottom button{
padding:10px;border:none;border-radius:12px;
background:#22c55e;color:white;font-size:12px;
}

.card{
position:absolute;bottom:80px;left:10px;right:10px;
background:#111;padding:10px;border-radius:15px;
display:none;z-index:1000;
}

.card img{width:100%;border-radius:10px;}

.admin{
position:absolute;top:60px;left:10px;right:10px;
background:#111;padding:10px;border-radius:10px;
display:none;z-index:1000;
}

.admin input{width:100%;margin:4px 0;padding:8px;border:none;border-radius:8px;}
</style>
</head>

<body>

<div id="map"></div>

<div class="top">
<input placeholder="🔍 Qidiruv..." oninput="search(this.value)">
</div>

<div class="card" id="card"></div>

<div class="bottom">
<button onclick="showNearby()">📍</button>
<button onclick="smartAI()">🧠</button>
<button onclick="showTop()">🔥</button>
<button onclick="openAdmin()">⚙️</button>
</div>

<div class="admin" id="adminBox">

<input id="adminPass" placeholder="Parol">
<button onclick="loginAdmin()">Kirish</button>

<div id="adminContent" style="display:none;">

<input id="newPass" placeholder="Yangi parol">
<button onclick="changePass()">🔐 Parolni o‘zgartir</button>

<hr>

<input id="name" placeholder="Joy nomi">
<input id="lat" placeholder="Lat">
<input id="lng" placeholder="Lng">
<input id="img" placeholder="Rasm link">

<button onclick="addPlace()">➕ Qo‘shish</button>

</div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// MAP
const map=L.map('map').setView([41.3,69.2],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 🔗 SHEET
const SHEET_URL="https://opensheet.elk.sh/1Hedps20_fmQ9CB6QavBVedQNtdk7f6Zb8P8fkxeH70w/1";

let sheetData=[];
let localData=JSON.parse(localStorage.getItem("places")||"[]");
let data=[];
let markers=[];

// LOAD SHEET
fetch(SHEET_URL)
.then(r=>r.json())
.then(d=>{
sheetData=d.map(x=>({
name:x.Name,
lat:+x.Lat,
lng:+x.Lng,
img:x.OldImage || x.NewImage,
category:x.Category,
views:+x.Views||0
}));

mergeData();
})
.catch(()=>mergeData());

// MERGE
function mergeData(){
data=[...sheetData,...localData];
render(data);
setTimeout(showNearby,2000);
}

// IMAGE FIX
function fixImg(url){
if(!url) return "https://via.placeholder.com/300";
return url.trim().replaceAll("(","%28").replaceAll(")","%29");
}

// RENDER
function render(arr){

markers.forEach(m=>map.removeLayer(m));
markers=[];

arr.forEach(p=>{
if(!p.lat) return;

let m=L.marker([p.lat,p.lng]).addTo(map);

m.on('click',()=>showCard(p));

markers.push(m);
});

}

// CARD
function showCard(p){

let card=document.getElementById("card");

card.style.display="block";

card.innerHTML=`
<h3>${p.name}</h3>
<img src="${fixImg(p.img)}" onerror="this.src='https://via.placeholder.com/300'">
`;

}

// SEARCH
function search(q){
q=q.toLowerCase();
render(data.filter(p=>(p.name||"").toLowerCase().includes(q)));
}

// 📍 NEARBY
function showNearby(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude,lng=pos.coords.longitude;

let sorted=[...data].sort((a,b)=>
Math.hypot(a.lat-lat,a.lng-lng)-
Math.hypot(b.lat-lat,b.lng-lng)
);

let top5=sorted.slice(0,5);

render(top5);

if(top5[0]) showCard(top5[0]);

});

}

// 🔥 TOP
function showTop(){

let sorted=[...data].sort((a,b)=>(b.views||0)-(a.views||0));

render(sorted.slice(0,5));

if(sorted[0]) showCard(sorted[0]);

}

// 🧠 REAL AI
function smartAI(){

if(data.length===0){
alert("Data yo‘q ❌");
return;
}

// USER HISTORY
let history=JSON.parse(localStorage.getItem("history")||"[]");

let favCat=null;

if(history.length>0){

let count={};

history.forEach(h=>{
count[h]=(count[h]||0)+1;
});

favCat=Object.keys(count).sort((a,b)=>count[b]-count[a])[0];

}

// FILTER
let list=favCat ? data.filter(p=>p.category===favCat) : data;

// MIX
let result=[...list].sort(()=>0.5-Math.random()).slice(0,5);

render(result);

showCard(result[0]);

alert("🤖 AI sizga mos 5 ta joy topdi");

}

// SAVE HISTORY
function saveHistory(cat){

let h=JSON.parse(localStorage.getItem("history")||"[]");

h.push(cat);

localStorage.setItem("history",JSON.stringify(h));

}

// ADMIN
function openAdmin(){
document.getElementById("adminBox").style.display="block";
}

// PASSWORD
let adminPassword=localStorage.getItem("adminPass")||"admin123";

function loginAdmin(){

if(adminPass.value===adminPassword){
adminContent.style.display="block";
}else alert("Xato ❌");

}

function changePass(){

adminPassword=newPass.value;

localStorage.setItem("adminPass",adminPassword);

alert("Parol o‘zgardi 🔐");

}

// ADD PLACE
function addPlace(){

let p={
name:name.value,
lat:+lat.value,
lng:+lng.value,
img:img.value
};

localData.push(p);

localStorage.setItem("places",JSON.stringify(localData));

mergeData();

alert("Qo‘shildi ✅");

}

</script>

</body>
</html>
