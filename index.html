<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TimeMap | Amir Temur Revival</title>
    
    <!-- AR va Xarita kutubxonalari -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <script src="https://unpkg.com"></script>

    <style>
        :root { --gold: #ffd700; --neon: #00f3ff; --royal: #1e3a8a; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }
        
        /* Xaritani majburan ko'rsatish */
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; height: 100% !important; width: 100% !important; z-index: 1; background: #010409; }

        .ui { position: absolute; z-index: 1000; pointer-events: auto; }
        .glass { background: rgba(10, 15, 30, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255,215,0,0.3); border-radius: 20px; padding: 15px; color: #fff; }

        /* AR Kamera oynasi */
        #ar-view { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; z-index: 5000; display: none; }
        #avatar-overlay { position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%); text-align: center; width: 90%; }
        
        /* Intro Singulyarlik */
        #portal { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index: 9999; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #singularity { width: 10px; height: 10px; background: #fff; border-radius: 50%; box-shadow: 0 0 30px #fff; transition: 1.5s; }
        .explode #singularity { transform: scale(500); opacity: 0; }

        .btn-ar { bottom: 30px; left: 50%; transform: translateX(-50%); padding: 15px 30px; background: linear-gradient(135deg, var(--gold), #b8860b); border: none; border-radius: 50px; font-weight: bold; color: #000; font-size: 18px; box-shadow: 0 0 20px var(--gold); cursor: pointer; }
        
        .history-card { top: 20px; left: 20px; width: 250px; border-left: 5px solid var(--gold); }
    </style>
</head>
<body>

    <!-- PORTAL INTRO -->
    <div id="portal" onclick="openGate()">
        <div id="singularity"></div>
        <div style="position: absolute; bottom: 20%; color: var(--gold); letter-spacing: 5px; font-size: 10px;">VAQTNI JONLANTIRISH</div>
    </div>

    <!-- AR VIEW (Kamera simulyatsiyasi) -->
    <div id="ar-view">
        <video id="camera" style="width: 100%; height: 100%; object-fit: cover;" autoplay playsinline></video>
        <div id="avatar-overlay">
            <img src="https://pinimg.com" id="amir-temur" style="width: 250px; filter: drop-shadow(0 0 20px var(--gold));" alt="Amir Temur">
            <div class="glass" id="ai-speech" style="margin-top: 20px; font-size: 18px; border: 2px solid var(--gold);">
                "Assalomu alaykum, farzandim. Men Amir Temurman. Ko'rib turganing bu Registon — mening saltanatimning yuragidir."
            </div>
            <button onclick="closeAR()" style="margin-top: 20px; background: #fff; color: #000; padding: 10px 20px; border-radius: 10px; border: none; font-weight: bold;">XARITAGA QAYTISH</button>
        </div>
    </div>

    <div id="map"></div>

    <div class="ui glass history-card">
        <b style="color: var(--gold); font-size: 20px;">TIMEMAP <span style="color: #fff;">AI</span></b>
        <div id="weather" style="font-size: 12px; margin-top: 5px; color: var(--neon);">Samarqand: 1420-yil holati</div>
    </div>

    <button class="ui btn-ar" onclick="startAR()">📸 TARIXNI JONLANTIRISH</button>

    <script>
        // Xaritani 100% chiqarish uchun qat'iy mantiq
        var map = L.map('map', { zoomControl: false, attributionControl: false }).setView([39.654, 66.975], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        function openGate() {
            document.getElementById('portal').classList.add('explode');
            speak("Vaqt portali ochildi. Amir Temur va Alisher Navoiy sizni kutmoqda.");
            setTimeout(() => {
                document.getElementById('portal').style.display = 'none';
                map.invalidateSize(); // Qora ekranni yo'qotadi
                // Har 2 soniyada xaritani tekshirish (majburiy uyg'otish)
                setInterval(() => { map.invalidateSize(); }, 2000);
            }, 1200);
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'uz-UZ';
            window.speechSynthesis.speak(msg);
        }

        // AR FUNKSIYASI (Turistlar uchun)
        async function startAR() {
            const arView = document.getElementById('ar-view');
            const video = document.getElementById('camera');
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                arView.style.display = 'block';
                speak("Amir Temur bilan yuzma-yuz muloqot boshlandi.");
            } catch (err) {
                alert("Kameraga ruxsat berilmadi yoki qurilmangiz AR-ni qo'llab-quvvatlamaydi.");
            }
        }

        function closeAR() {
            const stream = document.getElementById('camera').srcObject;
            if (stream) stream.getTracks().forEach(track => track.stop());
            document.getElementById('ar-view').style.display = 'none';
        }

        window.onload = () => {
            setTimeout(() => { map.invalidateSize(); }, 500);
        };
    </script>
</body>
</html>
